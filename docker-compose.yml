services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: savepoint_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-savepoint}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-savepoint}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://savepoint.example.com}
      AUTH_URL: ${AUTH_URL:-https://savepoint.example.com}
      AUTH_SECRET: ${AUTH_SECRET:-change-me}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      AUTOMATION_CRON_SECRET: ${AUTOMATION_CRON_SECRET:-change-me}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@savepoint.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-admin}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador SavePoint}
      ADMIN_TENANT_NAME: ${ADMIN_TENANT_NAME:-SavePoint}
      ADMIN_TENANT_SLUG: ${ADMIN_TENANT_SLUG:-savepoint}
      GEMINI_ENABLED: ${GEMINI_ENABLED:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-}
      WHATSAPP_ASSISTANT_ENABLED: ${WHATSAPP_ASSISTANT_ENABLED:-false}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_GRAPH_VERSION: ${WHATSAPP_GRAPH_VERSION:-v22.0}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-webhook}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Save Point Finança}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      NOTIFICATION_EMAIL_WEBHOOK_URL: ${NOTIFICATION_EMAIL_WEBHOOK_URL:-}
      NOTIFICATION_WHATSAPP_WEBHOOK_URL: ${NOTIFICATION_WHATSAPP_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - savepoint

  migrate:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: tools
    profiles: ["ops"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-savepoint}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-savepoint}
      GEMINI_ENABLED: ${GEMINI_ENABLED:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-}
    command: ["npx", "prisma", "migrate", "deploy", "--schema", "prisma/schema.prisma"]
    networks:
      - savepoint

  bootstrap-admin:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: tools
    profiles: ["ops"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-savepoint}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-savepoint}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@savepoint.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-admin}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador SavePoint}
      ADMIN_TENANT_NAME: ${ADMIN_TENANT_NAME:-SavePoint}
      ADMIN_TENANT_SLUG: ${ADMIN_TENANT_SLUG:-savepoint}
    command: ["node", "scripts/bootstrap-admin.mjs"]
    networks:
      - savepoint

  audit-invitations:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: tools
    profiles: ["ops"]
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-savepoint}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-savepoint}
      AUDIT_BASE_URL: ${AUDIT_BASE_URL:-http://web:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@savepoint.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-admin}
    command: ["npm", "run", "audit:invitations"]
    networks:
      - savepoint

  backup:
    build:
      context: ./ops/backup
      dockerfile: Dockerfile
    container_name: savepoint_backup
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f /backups/last-success.txt && find /backups/last-success.txt -mtime -2 | grep -q ."]
      interval: 30m
      timeout: 10s
      retries: 1
      start_period: 10m
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://savepoint.example.com}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@savepoint.local}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Save Point Finança}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      POSTGRES_DB: ${POSTGRES_DB:-savepoint}
      POSTGRES_USER: ${POSTGRES_USER:-savepoint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      BACKUP_DB_HOST: ${BACKUP_DB_HOST:-postgres}
      BACKUP_DB_PORT: ${BACKUP_DB_PORT:-5432}
      BACKUP_CRON_SCHEDULE: ${BACKUP_CRON_SCHEDULE:-0 3 * * *}
      BACKUP_RUN_ON_STARTUP: ${BACKUP_RUN_ON_STARTUP:-false}
      BACKUP_LOCAL_RETENTION_DAYS: ${BACKUP_LOCAL_RETENTION_DAYS:-14}
      BACKUP_CRITICAL_PATHS: ${BACKUP_CRITICAL_PATHS:-.env,docker-compose.yml,DEPLOY_AND_BOOTSTRAP.md}
      BACKUP_ENCRYPTION_PASSPHRASE: ${BACKUP_ENCRYPTION_PASSPHRASE:-}
      BACKUP_ALERT_EMAIL_ENABLED: ${BACKUP_ALERT_EMAIL_ENABLED:-true}
      BACKUP_ALERT_EMAIL_TO: ${BACKUP_ALERT_EMAIL_TO:-}
      BACKUP_GITHUB_ENABLED: ${BACKUP_GITHUB_ENABLED:-false}
      BACKUP_GITHUB_TOKEN: ${BACKUP_GITHUB_TOKEN:-}
      BACKUP_GITHUB_REPOSITORY: ${BACKUP_GITHUB_REPOSITORY:-}
      BACKUP_GITHUB_RELEASE_TAG: ${BACKUP_GITHUB_RELEASE_TAG:-savepoint-backups}
      BACKUP_GITHUB_RETENTION_COUNT: ${BACKUP_GITHUB_RETENTION_COUNT:-30}
      BACKUP_OBJECT_STORAGE_ENABLED: ${BACKUP_OBJECT_STORAGE_ENABLED:-false}
      BACKUP_OBJECT_STORAGE_ENDPOINT: ${BACKUP_OBJECT_STORAGE_ENDPOINT:-}
      BACKUP_OBJECT_STORAGE_BUCKET: ${BACKUP_OBJECT_STORAGE_BUCKET:-}
      BACKUP_OBJECT_STORAGE_REGION: ${BACKUP_OBJECT_STORAGE_REGION:-sa-saopaulo-1}
      BACKUP_OBJECT_STORAGE_PREFIX: ${BACKUP_OBJECT_STORAGE_PREFIX:-savepoint}
      BACKUP_OBJECT_STORAGE_ACCESS_KEY: ${BACKUP_OBJECT_STORAGE_ACCESS_KEY:-}
      BACKUP_OBJECT_STORAGE_SECRET_KEY: ${BACKUP_OBJECT_STORAGE_SECRET_KEY:-}
    volumes:
      - ./:/workspace:ro
      - savepoint_backups:/backups
    networks:
      - savepoint

  backup-once:
    build:
      context: ./ops/backup
      dockerfile: Dockerfile
    profiles: ["ops"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://savepoint.example.com}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@savepoint.local}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Save Point Finança}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      POSTGRES_DB: ${POSTGRES_DB:-savepoint}
      POSTGRES_USER: ${POSTGRES_USER:-savepoint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      BACKUP_DB_HOST: ${BACKUP_DB_HOST:-postgres}
      BACKUP_DB_PORT: ${BACKUP_DB_PORT:-5432}
      BACKUP_LOCAL_RETENTION_DAYS: ${BACKUP_LOCAL_RETENTION_DAYS:-14}
      BACKUP_CRITICAL_PATHS: ${BACKUP_CRITICAL_PATHS:-.env,docker-compose.yml,DEPLOY_AND_BOOTSTRAP.md}
      BACKUP_ENCRYPTION_PASSPHRASE: ${BACKUP_ENCRYPTION_PASSPHRASE:-}
      BACKUP_ALERT_EMAIL_ENABLED: ${BACKUP_ALERT_EMAIL_ENABLED:-true}
      BACKUP_ALERT_EMAIL_TO: ${BACKUP_ALERT_EMAIL_TO:-}
      BACKUP_GITHUB_ENABLED: ${BACKUP_GITHUB_ENABLED:-false}
      BACKUP_GITHUB_TOKEN: ${BACKUP_GITHUB_TOKEN:-}
      BACKUP_GITHUB_REPOSITORY: ${BACKUP_GITHUB_REPOSITORY:-}
      BACKUP_GITHUB_RELEASE_TAG: ${BACKUP_GITHUB_RELEASE_TAG:-savepoint-backups}
      BACKUP_GITHUB_RETENTION_COUNT: ${BACKUP_GITHUB_RETENTION_COUNT:-30}
      BACKUP_OBJECT_STORAGE_ENABLED: ${BACKUP_OBJECT_STORAGE_ENABLED:-false}
      BACKUP_OBJECT_STORAGE_ENDPOINT: ${BACKUP_OBJECT_STORAGE_ENDPOINT:-}
      BACKUP_OBJECT_STORAGE_BUCKET: ${BACKUP_OBJECT_STORAGE_BUCKET:-}
      BACKUP_OBJECT_STORAGE_REGION: ${BACKUP_OBJECT_STORAGE_REGION:-sa-saopaulo-1}
      BACKUP_OBJECT_STORAGE_PREFIX: ${BACKUP_OBJECT_STORAGE_PREFIX:-savepoint}
      BACKUP_OBJECT_STORAGE_ACCESS_KEY: ${BACKUP_OBJECT_STORAGE_ACCESS_KEY:-}
      BACKUP_OBJECT_STORAGE_SECRET_KEY: ${BACKUP_OBJECT_STORAGE_SECRET_KEY:-}
    command: ["/usr/local/bin/run-backup.sh"]
    volumes:
      - ./:/workspace:ro
      - savepoint_backups:/backups
    networks:
      - savepoint

  postgres:
    image: postgres:17-alpine
    container_name: savepoint_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-savepoint}
      POSTGRES_USER: ${POSTGRES_USER:-savepoint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-savepoint} -d ${POSTGRES_DB:-savepoint}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - savepoint_postgres:/var/lib/postgresql/data
    networks:
      - savepoint

networks:
  savepoint:
    driver: bridge

volumes:
  savepoint_postgres:
  savepoint_backups:
