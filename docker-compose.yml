# ═══════════════════════════════════════════════════════════════════════════
# Save Point Finanças v3 — docker-compose.yml
#
# Deployment: Coolify + Oracle Cloud (3 CPU, 24GB RAM)
#
# ┌─────────────────────────────────────────────────────────────────┐
# │ COMO O COOLIFY FUNCIONA COM PORTAS                              │
# │                                                                 │
# │  Internet → Coolify Traefik (:80/:443) → app:8000 (interno)    │
# │                                                                 │
# │  ✅ O app NUNCA expõe 80 ou 443 — o Traefik do Coolify faz isso│
# │  ✅ Apenas `expose: 8000` — visível só dentro do Docker         │
# │  ✅ Postgres e Redis ficam SOMENTE na rede interna              │
# │  ✅ Coolify injeta COOLIFY_FQDN e gerencia o SSL               │
# └─────────────────────────────────────────────────────────────────┘
#
# Redes:
#   - coolify (external): Traefik do Coolify se conecta aqui
#   - internal (bridge):  App ↔ Postgres ↔ Redis (isolado)
#
# Para deploy no Coolify:
#   1. Cole este arquivo no campo "Docker Compose" do serviço
#   2. Preencha as variáveis de ambiente no painel do Coolify
#   3. Em "Domains", defina seu domínio — o Coolify gera o SSL
#   4. Clique em Deploy
# ═══════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────────
  # Otimizado para 24GB RAM: shared_buffers=4GB, effective_cache=16GB
  postgres:
    image: postgres:16-alpine
    container_name: savepoint_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-savepoint}
      POSTGRES_USER:     ${POSTGRES_USER:-savepoint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-U35mOyNY}
      PGDATA:            /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -cshared_buffers=4GB
      - -ceffective_cache_size=16GB
      - -cmax_connections=200
      - -cwork_mem=64MB
      - -cwal_buffers=64MB
      - -ccheckpoint_completion_target=0.9
      - -cmin_wal_size=1GB
      - -cmax_wal_size=4GB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-savepoint} -d ${POSTGRES_DB:-savepoint}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  # ── Redis 7 ───────────────────────────────────────────────────────
  # Aumentado para 2GB RAM com persistência
  redis:
    image: redis:7-alpine
    container_name: savepoint_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-U35mOyNY}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-U35mOyNY}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 2G

  # ── App FastAPI (Monolith) ─────────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: savepoint_app
    restart: unless-stopped

    # ✅ expose: torna a porta visível dentro do Docker, mas NÃO publica no host
    # O Traefik do Coolify acessa via rede "coolify" + porta 8000
    ports:
      - "8000:8000"

    env_file: .env
    environment:
      # URLs construídas a partir das vars do .env — nunca mudam
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-savepoint}:${POSTGRES_PASSWORD:-U35mOyNY}@postgres:5432/${POSTGRES_DB:-savepoint}"
      REDIS_URL:    "redis://:${REDIS_PASSWORD:-U35mOyNY}@redis:6379/0"

      # Modo de produção
      APP_ENV: production

      # Cookies seguros SOMENTE se HTTPS (o Coolify sempre usa HTTPS)
      SECURE_COOKIES: "true"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - internal   # Acessa Postgres e Redis

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G

  # ── Backup automático → Backblaze B2 ──────────────────────────────
  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: savepoint_backup
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_DB:       ${POSTGRES_DB:-savepoint}
      POSTGRES_USER:     ${POSTGRES_USER:-savepoint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-U35mOyNY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal  # Apenas acessa o Postgres — sem saída pública necessária
    deploy:
      resources:
        limits:
          memory: 512M

# ── Redes ──────────────────────────────────────────────────────────
networks:
  # Rede interna — isolada, só containers deste compose se enxergam
  internal:
    driver: bridge

# ── Volumes persistentes ────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
