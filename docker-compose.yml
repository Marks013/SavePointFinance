# Save Point Finanças — Docker Compose
# Compatible with: ARM64 (Oracle Free) + x86_64 (Hetzner/Contabo/DO)

services:
  postgres:
    image: postgres:16-alpine
    container_name: savepoint_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-savepoint}
      POSTGRES_USER: ${POSTGRES_USER:-savepoint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-savepoint}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: savepoint_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: savepoint_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-savepoint}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-savepoint}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal
    expose:
      - 8000

  frontend:
    build:
      context: ./frontend-html
      dockerfile: Dockerfile
    container_name: savepoint_web
    restart: unless-stopped
    networks:
      - internal
    expose:
      - 80

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: savepoint_backup
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-savepoint}
      POSTGRES_USER: ${POSTGRES_USER:-savepoint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      B2_APPLICATION_KEY_ID: ${B2_APPLICATION_KEY_ID:-}
      B2_APPLICATION_KEY: ${B2_APPLICATION_KEY:-}
      B2_BUCKET_NAME: ${B2_BUCKET_NAME:-savepoint-backups}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  # Nginx Proxy Manager — HTTPS automático com Let's Encrypt
  proxy:
    image: jc21/nginx-proxy-manager:latest
    container_name: savepoint_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./proxy/data:/data
      - ./proxy/letsencrypt:/etc/letsencrypt
    environment:
      - DB_SQLITE_FILE=/data/database.sqlite
      - DISABLE_IPV6=false
    depends_on:
      - frontend
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
