# ═══════════════════════════════════════════════════════════════════
# Save Point Finanças v3 — docker-compose.yml
#
# Deployment: Coolify + Oracle Cloud Free Tier (ARM64 / x86_64)
#
# ┌─────────────────────────────────────────────────────────────────┐
# │ COMO O COOLIFY FUNCIONA COM PORTAS                              │
# │                                                                 │
# │  Internet → Coolify Traefik (:80/:443) → app:8000 (interno)    │
# │                                                                 │
# │  ✅ O app NUNCA expõe 80 ou 443 — o Traefik do Coolify faz isso│
# │  ✅ Apenas `expose: 8000` — visível só dentro do Docker         │
# │  ✅ Postgres e Redis ficam SOMENTE na rede interna              │
# │  ✅ Coolify injeta COOLIFY_FQDN e gerencia o certificado SSL    │
# └─────────────────────────────────────────────────────────────────┘
#
# Redes:
#   - coolify (external): Traefik do Coolify se conecta aqui
#   - internal (bridge):  App ↔ Postgres ↔ Redis (isolado)
#
# Para deploy no Coolify:
#   1. Cole este arquivo no campo "Docker Compose" do serviço
#   2. Preencha as variáveis de ambiente no painel do Coolify
#   3. Em "Domains", defina seu domínio — o Coolify gera o SSL
#   4. Clique em Deploy
# ═══════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: savepoint_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-savepoint}
      POSTGRES_USER:     ${POSTGRES_USER:-savepoint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-U35mOyNY}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-savepoint} -d ${POSTGRES_DB:-savepoint}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - internal
    # Postgres NUNCA entra na rede pública — apenas internal

  # ── Redis 7 ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: savepoint_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-U35mOyNY}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-U35mOyNY}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    # Redis NUNCA entra na rede pública — apenas internal

  # ── App FastAPI (Monolith) ─────────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: savepoint_app
    restart: unless-stopped

    # ✅ expose: torna a porta visível dentro do Docker, mas NÃO publica no host
    # O Traefik do Coolify acessa via rede "coolify" + porta 8000
    expose:
      - "8000"

    # ── Labels para o Traefik do Coolify ──────────────────────────────
    # O Coolify lê esses labels e configura o roteamento + SSL automaticamente.
    # Você NÃO precisa editar esses labels — o Coolify injeta COOLIFY_FQDN.
    labels:
      # Informa ao Coolify qual porta o app usa internamente
      - "coolify.managed=true"
      - "coolify.port=8000"

      # Labels Traefik (Coolify configura automaticamente com base no domínio)
      # Se precisar configurar manualmente, descomente e ajuste:
      # - "traefik.enable=true"
      # - "traefik.http.routers.savepoint.rule=Host(`${COOLIFY_FQDN}`)"
      # - "traefik.http.routers.savepoint.entrypoints=https"
      # - "traefik.http.routers.savepoint.tls=true"
      # - "traefik.http.routers.savepoint.tls.certresolver=letsencrypt"
      # - "traefik.http.services.savepoint.loadbalancer.server.port=8000"

    env_file: .env
    environment:
      # URLs construídas a partir das vars do .env — nunca mudam
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-savepoint}:${POSTGRES_PASSWORD:-U35mOyNY}@postgres:5432/${POSTGRES_DB:-savepoint}"
      REDIS_URL:    "redis://:${REDIS_PASSWORD:-U35mOyNY}@redis:6379/0"

      # Modo de produção
      APP_ENV: production

      # Cookies seguros SOMENTE se HTTPS (o Coolify sempre usa HTTPS)
      # O app lê essa var para definir secure=True nos cookies
      SECURE_COOKIES: "true"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - internal   # Acessa Postgres e Redis
      - coolify    # Traefik do Coolify roteia o tráfego externo aqui

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    # Mapeamento de volumes para hot-reload em dev (comentado em produção)
    # volumes:
    #   - ./backend/app/templates:/app/app/templates
    #   - ./backend/app/static:/app/app/static

  # ── Backup automático → Backblaze B2 ──────────────────────────────
  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: savepoint_backup
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_DB:       ${POSTGRES_DB:-savepoint}
      POSTGRES_USER:     ${POSTGRES_USER:-savepoint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-U35mOyNY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal  # Apenas acessa o Postgres — sem saída pública necessária

# ── Redes ──────────────────────────────────────────────────────────
networks:
  # Rede do Coolify/Traefik — já existente, gerenciada pelo Coolify
  # O nome padrão é "coolify" — confirme no painel do Coolify em
  # Settings → Network se o nome for diferente no seu ambiente
  coolify:
    external: true
    name: coolify

  # Rede interna — isolada, só containers deste compose se enxergam
  internal:
    driver: bridge
    internal: true   # ← garante que NENHUM container desta rede
                     #   acessa a internet diretamente (segurança extra)

# ── Volumes persistentes ────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
