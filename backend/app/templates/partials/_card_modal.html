{% set is_edit = card is defined and card is not none %}
<div class="modal-header">
  <h3>{{ 'Editar Cartão' if is_edit else 'Novo Cartão' }}</h3>
  <button class="btn btn--ghost btn--icon" onclick="document.getElementById('modal-overlay').classList.remove('modal--open')">✕</button>
</div>
<form {% if is_edit %}hx-put="/settings/cards/{{ card.id }}"{% else %}hx-post="/settings/cards"{% endif %}
      hx-target="#cards-panel" hx-swap="innerHTML">
  <div class="modal-body">
    <div class="form-row">
      <div class="form-group"><label class="form-label">Nome *</label>
        <input type="text" name="name" class="form-control" required placeholder="Nubank Platinum" value="{{ card.name if is_edit else '' }}"></div>
      <div class="form-group"><label class="form-label">Bandeira</label>
        <select name="brand" class="form-control">
          {% for b in ['Visa','Mastercard','Elo','Amex','Hipercard'] %}
          <option {% if is_edit and card.brand == b %}selected{% endif %}>{{ b }}</option>
          {% endfor %}
        </select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Últimos 4 dígitos</label>
        <input type="text" name="last4" class="form-control" maxlength="4" placeholder="1234" value="{{ card.last4 or '' if is_edit else '' }}"></div>
      <div class="form-group"><label class="form-label">Limite (R$)</label>
        <input type="number" name="limit_amount" class="form-control" step="0.01" value="{{ card.limit_amount if is_edit else '0' }}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Dia fechamento</label>
        <input type="number" name="close_day" class="form-control" min="1" max="31" value="{{ card.close_day if is_edit else '3' }}"></div>
      <div class="form-group"><label class="form-label">Dia vencimento</label>
        <input type="number" name="due_day" class="form-control" min="1" max="31" value="{{ card.due_day if is_edit else '10' }}"></div>
    </div>
    <div class="form-group"><label class="form-label">Cor</label>
      <input type="color" name="color" class="form-control" style="height:36px;width:60px;padding:2px" value="{{ card.color if is_edit else '#374151' }}"></div>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn--ghost" onclick="document.getElementById('modal-overlay').classList.remove('modal--open')">Cancelar</button>
    <button type="submit" class="btn btn--primary">Salvar</button>
  </div>
</form>
