{% set is_edit = cat is not none %}
<div class="modal-header">
  <h3>{{ 'Editar Categoria' if is_edit else 'Nova Categoria' }}</h3>
  <button type="button" class="btn btn--ghost btn--icon" onclick="document.getElementById('modal-overlay').classList.remove('modal--open')">✕</button>
</div>
{% if error %}<div style="background:var(--red-bg);border:1px solid var(--red-border);padding:10px 20px;color:var(--red);font-size:0.8rem">⚠ {{ error }}</div>{% endif %}
<form {% if is_edit %}hx-put="/categories/{{ cat.id }}"{% else %}hx-post="/categories"{% endif %} hx-target="body" hx-swap="outerHTML">
  <div class="modal-body">
    <div class="form-group"><label class="form-label">Nome *</label>
      <input type="text" name="name" class="form-control" required placeholder="Ex: Alimentação" value="{{ cat.name if is_edit else '' }}"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Tipo *</label>
        <select name="type" class="form-control">
          <option value="expense" {% if is_edit and cat.type.value == 'expense' %}selected{% endif %}>Despesa</option>
          <option value="income"  {% if is_edit and cat.type.value == 'income'  %}selected{% endif %}>Receita</option>
        </select></div>
      <div class="form-group"><label class="form-label">Ícone</label>
        <input type="text" name="icon" class="form-control" placeholder="tag" value="{{ cat.icon if is_edit else 'tag' }}"></div>
    </div>
    <div class="form-group"><label class="form-label">Cor</label>
      <input type="color" name="color" class="form-control" style="height:36px;width:60px;padding:2px" value="{{ cat.color if is_edit else '#10B981' }}"></div>
    <div class="form-group"><label class="form-label">Palavras-chave (separadas por vírgula)</label>
      <input type="text" name="keywords" class="form-control" placeholder="ifood, mercado"
             value="{{ (cat.keywords or []) | join(', ') if is_edit else '' }}">
      <div class="form-hint">Usadas para auto-classificação (Camada 1 — sem custo de IA).</div></div>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn--ghost" onclick="document.getElementById('modal-overlay').classList.remove('modal--open')">Cancelar</button>
    <button type="submit" class="btn btn--primary">Salvar</button>
  </div>
</form>
