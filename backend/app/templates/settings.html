{% extends "base.html" %}
{% block title %}Contas — Save Point Finanças{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-title">Contas</div>
  
</div>

<div class="page-body" id="settings-body">

  {# ── Aba Contas ── #}
  {% if tab == 'accounts' or not tab %}
  <div class="section-header">
    <div class="section-title">Contas bancárias</div>
    <button class="btn btn--primary"
            hx-get="/settings/accounts/new-form"
            hx-target="#modal-content" hx-swap="innerHTML"
            hx-on::after-request="openModal()">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      Nova conta
    </button>
  </div>
  <div id="accounts-panel">
    {% include "partials/_accounts_table.html" %}
  </div>
  {% endif %}

</div>{# /page-body #}
{% endblock %}
