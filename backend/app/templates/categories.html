{% extends "base.html" %}
{% block title %}Categorias — Save Point Finanças{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-title">Categorias</div>
  <div class="page-actions">
    <div class="tabs" style="margin-bottom:0;border:none">
      <a href="/categories?tab=expense" class="tab {% if tab == 'expense' %}active{% endif %}"
         hx-get="/categories?tab=expense" hx-target="#cat-panel" hx-push-url="true">Despesas</a>
      <a href="/categories?tab=income" class="tab {% if tab == 'income' %}active{% endif %}"
         hx-get="/categories?tab=income" hx-target="#cat-panel" hx-push-url="true">Receitas</a>
    </div>
    <a href="/categories/new" hx-get="/categories/new" hx-target="#modal-content" hx-swap="innerHTML"
       hx-on::after-request="openModal()" class="btn btn--primary">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      Nova categoria
    </a>
  </div>
</div>
<div class="page-body">
  <div id="cat-panel">{% include "partials/_cat_table.html" %}</div>
</div>
{% endblock %}
