<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — Save Point Finanças</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-left">
    <div class="auth-brand">
      <div class="auth-brand-mark">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
        </svg>
      </div>
      <div class="auth-brand-name">Save Point <span>Finanças</span></div>
    </div>
    <div class="auth-headline">Comece agora.<br>É grátis.</div>
    <p class="auth-sub">Crie seu workspace em segundos e comece a organizar suas finanças.</p>
  </div>
  <div class="auth-right">
    <div class="auth-form-box">
      <div class="auth-form-title">Criar conta</div>
      <div class="auth-form-sub">Novo workspace</div>
      {% if error %}<div class="auth-error">{{ error }}</div>{% endif %}
      <form class="auth-form" method="POST" action="/register">
        <div class="form-group"><label class="form-label">Nome do workspace</label>
          <input name="workspace_name" type="text" class="form-control" placeholder="Ex: Família Silva" required></div>
        <div class="form-group"><label class="form-label">Seu nome</label>
          <input name="name" type="text" class="form-control" placeholder="João Silva" required></div>
        <div class="form-group"><label class="form-label">E-mail</label>
          <input name="email" type="email" class="form-control" placeholder="seu@email.com" required></div>
        <div class="form-group"><label class="form-label">Senha</label>
          <input name="password" type="password" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6"></div>
        <button type="submit" class="btn btn--primary btn--lg">Criar conta grátis</button>
      </form>
      <div class="auth-switch mt-8">Já tem conta? <a href="/login">Entrar</a></div>
    </div>
  </div>
</div>
</body>
</html>
