server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"                     always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ── Gzip ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── Proxy /api/ → FastAPI backend ───────────────────────────────
    # IMPORTANT: usado somente em dev local / docker-compose direto.
    # Em produção via Coolify o JS chama o backend diretamente via HTTPS
    # (api.js detecta o padrão automaticamente), então este bloco
    # serve como fallback para desenvolvimento.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        # Repassa o host real para o backend
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Aumenta timeouts para evitar 504 em endpoints lentos
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;

        # Permite corpo grande (uploads/CSV)
        client_max_body_size 20M;
    }

    # ── Cache para assets estáticos ──────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── SPA fallback ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
