server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Serve static files directly (CSS, JS, images)
    location /css/ {
        alias /usr/share/nginx/html/css/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /js/ {
        alias /usr/share/nginx/html/js/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /partials/ {
        alias /usr/share/nginx/html/partials/;
        expires 7d;
    }

    # Cache static assets (images, fonts)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API routes → proxy to backend
    location /api/ {
        proxy_pass http://172.16.80.7:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        proxy_pass_request_body on;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # All other routes (GET and POST) → proxy to backend
    location / {
        proxy_pass http://172.16.80.7:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        proxy_pass_request_body on;
        
        # Pass all response headers including cookies
        proxy_pass_header Set-Cookie;
        proxy_pass_header Cookie;
        proxy_pass_header Authorization;
        
        # Don't buffer the response - allows cookies to pass through
        proxy_buffering off;
    }
}