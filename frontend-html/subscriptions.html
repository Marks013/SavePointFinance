<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assinaturas — Save Point Finanças</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app-shell">
  <div id="sidebar-mount"></div>
  <div class="main-content">
    <div class="page-header">
      <div class="page-title">Assinaturas</div>
      <div class="page-actions">
        <label style="display:flex;align-items:center;gap:8px;font-size:0.8rem;color:var(--text-2);cursor:pointer">
          <input type="checkbox" id="active-only" style="accent-color:var(--em)"> Somente ativas
        </label>
        <button class="btn btn--primary" id="btn-new-sub">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          Nova assinatura
        </button>
      </div>
    </div>

    <div class="page-body">
      <!-- Summary -->
      <div class="stat-grid" style="margin-bottom:20px">
        <div class="stat-card stat-card--expense">
          <div class="stat-label">Total mensal</div>
          <div class="stat-value stat-value--expense" id="stat-total-monthly">—</div>
        </div>
        <div class="stat-card stat-card--neutral">
          <div class="stat-label">Total anual estimado</div>
          <div class="stat-value" style="color:var(--amber)" id="stat-total-annual">—</div>
        </div>
        <div class="stat-card stat-card--balance">
          <div class="stat-label">Ativas</div>
          <div class="stat-value stat-value--balance" id="stat-active">—</div>
        </div>
        <div class="stat-card stat-card--income">
          <div class="stat-label">Próximo vencimento</div>
          <div class="stat-value" style="font-size:1rem;color:var(--text)" id="stat-next-due">—</div>
        </div>
      </div>

      <!-- Cards grid -->
      <div class="sub-cards" id="subs-container">
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-state-title">Carregando...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="sub-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="sub-modal-title">Nova Assinatura</h3>
      <button class="btn btn--ghost btn--icon" data-close-modal>✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Nome *</label>
        <input type="text" id="sub-name" class="form-control" placeholder="Netflix, Spotify...">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Valor (R$) *</label>
          <input type="number" id="sub-amount" class="form-control" step="0.01" min="0.01" placeholder="0,00">
        </div>
        <div class="form-group">
          <label class="form-label">Dia de cobrança *</label>
          <input type="number" id="sub-day" class="form-control" min="1" max="31" placeholder="1-31">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Próxima cobrança *</label>
        <input type="date" id="sub-next-date" class="form-control">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Categoria</label>
          <select id="sub-category" class="form-control"><option value="">— Nenhuma —</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">Cartão</label>
          <select id="sub-card" class="form-control"><option value="">— Nenhum —</option></select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn--ghost" data-close-modal>Cancelar</button>
      <button class="btn btn--primary" id="sub-save-btn">Salvar</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuthAndRender } from './js/nav.js';
  import { subscriptionsApi, categoriesApi, cardsApi } from './js/api.js';
  import {
    formatBRL, formatDate, toast, confirm,
    openModal, closeModal, setupModalClose, fillSelect
  } from './js/utils.js';
  import { brandAvatar, getBrand } from './js/brands.js';

  if (!requireAuthAndRender('subscriptions.html')) throw new Error('not auth');

  let editId = null;
  let allSubs = [];
  let categories = [], cards = [];

  async function loadRefs() {
    try {
      [categories, cards] = await Promise.all([
        categoriesApi.list().catch(() => []),
        cardsApi.list().catch(() => []),
      ]);
      fillSelect(document.getElementById('sub-category'), categories, 'id', 'name', '— Nenhuma —');
      fillSelect(document.getElementById('sub-card'), cards, 'id', 'name', '— Nenhum —');
    } catch (err) {
      console.error('[Assinaturas] loadRefs:', err);
      toast('Erro ao carregar referências: ' + err.message, 'error');
    }
  }

  function catName(id) { return categories.find(c => c.id === id)?.name || null; }
  function cardName(id) { return cards.find(c => c.id === id)?.name || null; }

  async function loadSubs() {
    const container = document.getElementById('subs-container');
    container.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-title">Carregando...</div></div>`;
    const activeOnly = document.getElementById('active-only').checked;

    try {
      allSubs = await subscriptionsApi.list({ active_only: activeOnly });

      const activeSubs = allSubs.filter(s => s.is_active);
      const monthly = activeSubs.reduce((a, s) => a + s.amount, 0);
      document.getElementById('stat-total-monthly').textContent = formatBRL(monthly);
      document.getElementById('stat-total-annual').textContent  = formatBRL(monthly * 12);
      document.getElementById('stat-active').textContent = activeSubs.length;

      const upcoming = [...activeSubs].sort((a, b) =>
        new Date(a.next_billing_date) - new Date(b.next_billing_date));
      document.getElementById('stat-next-due').textContent =
        upcoming.length ? `${upcoming[0].name} — ${formatDate(upcoming[0].next_billing_date)}` : '—';

      if (!allSubs.length) {
        container.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <div class="empty-state-title">Nenhuma assinatura cadastrada</div>
          <div class="empty-state-sub">Adicione suas assinaturas recorrentes aqui</div>
        </div>`;
        return;
      }

      container.innerHTML = allSubs.map(s => {
        const cat  = catName(s.category_id);
        const card = cardName(s.card_id);
        const brand  = getBrand(s.name, s.color || '#10B981');
        const avatar = brandAvatar(s.name, s.color || '#10B981', 44);
        const daysToNext = Math.ceil((new Date(s.next_billing_date) - new Date()) / 86400000);
        const urgency = daysToNext <= 3 ? 'var(--red)' : daysToNext <= 7 ? 'var(--amber)' : 'var(--text-3)';
        return `
          <div class="sub-card" style="border-top:3px solid ${brand.color};opacity:${s.is_active ? 1 : 0.6}">
            <div class="sub-card-header" style="display:flex;align-items:center;gap:12px">
              ${avatar}
              <div style="flex:1;min-width:0">
                <div class="sub-card-name">
                  ${brand.emoji} ${s.name}
                  ${!s.is_active ? '<span class="badge badge--inactive" style="margin-left:4px">Inativa</span>' : ''}
                </div>
                <div style="font-size:0.85rem;color:var(--text-3)">${s.type === 'income' ? '📈 Receita' : '📤 Despesa'}</div>
              </div>
              <div class="sub-card-amount" style="color:${brand.color}">−${formatBRL(s.amount)}</div>
            </div>
            <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
              ${cat  ? `<div class="sub-card-meta">📂 ${cat}</div>` : ''}
              ${card ? `<div class="sub-card-meta">💳 ${card}</div>` : ''}
              <div class="sub-card-meta" style="color:${urgency}">
                📅 Todo dia ${s.billing_day} · próxima: <strong>${formatDate(s.next_billing_date)}</strong>
                ${daysToNext <= 7 && s.is_active
                  ? ` <span>(${daysToNext <= 0 ? 'hoje/vencida' : daysToNext + 'd'})</span>`
                  : ''}
              </div>
            </div>
            <div class="sub-card-actions">
              ${s.is_active
                ? `<button class="btn btn--secondary btn--sm" onclick="generateTx('${s.id}','${s.name}')">▶ Gerar tx</button>`
                : ''}
              <button class="btn btn--ghost btn--sm" onclick="editSub('${s.id}')">✎ Editar</button>
              <button class="btn btn--ghost btn--sm" style="color:var(--red)" onclick="deleteSub('${s.id}','${s.name}')">✕</button>
            </div>
          </div>`;
      }).join('');
    } catch (err) {
      console.error('[Assinaturas] loadSubs:', err);
      container.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="empty-state-title" style="color:var(--red)">⚠️ ${err.message}</div>
      </div>`;
      toast('Erro ao carregar assinaturas: ' + err.message, 'error');
    }
  }

  window.editSub = (id) => {
    const s = allSubs.find(x => x.id === id);
    if (!s) return;
    editId = id;
    document.getElementById('sub-modal-title').textContent = 'Editar Assinatura';
    document.getElementById('sub-name').value      = s.name;
    document.getElementById('sub-amount').value    = s.amount;
    document.getElementById('sub-day').value       = s.billing_day;
    document.getElementById('sub-next-date').value = s.next_billing_date;
    document.getElementById('sub-category').value  = s.category_id || '';
    document.getElementById('sub-card').value      = s.card_id || '';
    openModal('sub-modal');
  };

  window.deleteSub = async (id, name) => {
    if (!await confirm(`Excluir assinatura "${name}"?`)) return;
    try {
      await subscriptionsApi.delete(id);
      toast('Assinatura excluída.', 'success');
      loadSubs();
    } catch (err) { toast('Erro ao excluir: ' + err.message, 'error'); }
  };

  window.generateTx = async (id, name) => {
    if (!await confirm(`Gerar transação de cobrança para "${name}"?`)) return;
    try {
      const res = await subscriptionsApi.generateTransaction(id);
      toast(`Transação gerada! Próxima: ${res.next_billing_date}`, 'success');
      loadSubs();
    } catch (err) { toast('Erro ao gerar: ' + err.message, 'error'); }
  };

  document.getElementById('btn-new-sub').onclick = () => {
    editId = null;
    document.getElementById('sub-modal-title').textContent = 'Nova Assinatura';
    ['sub-name','sub-amount','sub-day','sub-next-date'].forEach(id =>
      document.getElementById(id).value = '');
    document.getElementById('sub-category').value = '';
    document.getElementById('sub-card').value = '';
    openModal('sub-modal');
  };

  document.getElementById('sub-save-btn').onclick = async () => {
    const btn = document.getElementById('sub-save-btn');
    const name   = document.getElementById('sub-name').value.trim();
    const amount = parseFloat(document.getElementById('sub-amount').value);
    const day    = parseInt(document.getElementById('sub-day').value);
    const date   = document.getElementById('sub-next-date').value;

    if (!name || !amount || !day || !date) {
      toast('Preencha todos os campos obrigatórios.', 'warning');
      return;
    }

    btn.disabled = true;
    try {
      const body = {
        name, amount, billing_day: day, next_billing_date: date,
        category_id: document.getElementById('sub-category').value || null,
        card_id:     document.getElementById('sub-card').value     || null,
      };
      if (editId) {
        await subscriptionsApi.update(editId, body);
        toast('Assinatura atualizada.', 'success');
      } else {
        await subscriptionsApi.create(body);
        toast('Assinatura criada.', 'success');
      }
      closeModal('sub-modal');
      loadSubs();
    } catch (err) { toast('Erro ao salvar: ' + err.message, 'error'); }
    finally { btn.disabled = false; }
  };

  document.getElementById('active-only').onchange = loadSubs;
  setupModalClose('sub-modal');

  await loadRefs();
  loadSubs();
</script>
</body>
</html>
