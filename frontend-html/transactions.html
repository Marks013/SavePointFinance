<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transações — Save Point Finanças</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app-shell">
  <div id="sidebar-mount"></div>

  <div class="main-content">
    <div class="page-header">
      <div class="page-title">Transações</div>
      <div class="page-actions">
        <button class="btn btn--primary" id="btn-new-tx">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          Nova transação
        </button>
      </div>
    </div>

    <div class="page-body">
      <!-- Filters -->
      <div class="filters-bar">
        <div class="month-nav">
          <button class="btn btn--ghost btn--sm" id="prev-month">‹</button>
          <div class="month-nav-label" id="month-label">—</div>
          <button class="btn btn--ghost btn--sm" id="next-month">›</button>
        </div>
        <input type="text" class="search-input" id="search-input" placeholder="Buscar...">
        <select class="filter-control" id="filter-type">
          <option value="">Todos os tipos</option>
          <option value="income">Receitas</option>
          <option value="expense">Despesas</option>
        </select>
        <select class="filter-control" id="filter-category">
          <option value="">Todas as categorias</option>
        </select>
        <select class="filter-control" id="filter-payment">
          <option value="">Forma de pagamento</option>
          <option value="credit_card">Cartão de Crédito</option>
          <option value="debit_card">Cartão de Débito</option>
          <option value="pix">Pix</option>
          <option value="money">Dinheiro</option>
          <option value="bank_transfer">Transferência</option>
          <option value="boleto">Boleto</option>
        </select>
      </div>

      <!-- Summary chips -->
      <div style="display:flex;gap:12px;margin-bottom:16px;font-size:0.8rem">
        <div style="background:var(--em-bg);border:1px solid var(--em-border);border-radius:4px;padding:5px 12px;color:var(--em)">
          Receitas: <strong id="sum-income">—</strong>
        </div>
        <div style="background:var(--red-bg);border:1px solid var(--red-border);border-radius:4px;padding:5px 12px;color:var(--red)">
          Despesas: <strong id="sum-expense">—</strong>
        </div>
        <div style="background:var(--bg-3);border:1px solid var(--border);border-radius:4px;padding:5px 12px;color:var(--text-2)">
          Saldo: <strong id="sum-balance" style="color:var(--blue)">—</strong>
        </div>
      </div>

      <!-- Table -->
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Descrição</th>
              <th>Categoria</th>
              <th>Pagamento</th>
              <th>Parcelas</th>
              <th style="text-align:right">Valor</th>
              <th>Tipo</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tx-tbody">
            <tr><td colspan="8" style="padding:32px;text-align:center;color:var(--text-3)">Carregando...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="pagination">
        <span id="pag-info"></span>
        <div class="pagination-btns">
          <button class="btn btn--ghost btn--sm" id="pag-prev">Anterior</button>
          <button class="btn btn--ghost btn--sm" id="pag-next">Próximo</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Nova/Editar Transação -->
<div class="modal" id="tx-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="tx-modal-title">Nova Transação</h3>
      <button class="btn btn--ghost btn--icon" data-close-modal>✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Data *</label>
          <input type="date" id="tx-date" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Tipo *</label>
          <select id="tx-type" class="form-control">
            <option value="expense">Despesa</option>
            <option value="income">Receita</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Descrição *</label>
        <input type="text" id="tx-desc" class="form-control" placeholder="Ex: Supermercado Extra" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Valor (R$) *</label>
          <input type="number" id="tx-amount" class="form-control" placeholder="0,00" step="0.01" min="0" required>
        </div>
        <div class="form-group">
          <label class="form-label">Forma de Pagamento *</label>
          <select id="tx-payment" class="form-control">
            <option value="pix">Pix</option>
            <option value="credit_card">Cartão de Crédito</option>
            <option value="debit_card">Cartão de Débito</option>
            <option value="money">Dinheiro</option>
            <option value="bank_transfer">Transferência</option>
            <option value="boleto">Boleto</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Categoria</label>
          <select id="tx-category" class="form-control"><option value="">— Nenhuma —</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">Parcelamento</label>
          <select id="tx-installments" class="form-control">
            <option value="1">À vista</option>
            <option value="2">2x</option>
            <option value="3">3x</option>
            <option value="4">4x</option>
            <option value="5">5x</option>
            <option value="6">6x</option>
            <option value="8">8x</option>
            <option value="10">10x</option>
            <option value="12">12x</option>
            <option value="18">18x</option>
            <option value="24">24x</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Conta</label>
          <select id="tx-account" class="form-control"><option value="">— Nenhuma —</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">Cartão</label>
          <select id="tx-card" class="form-control"><option value="">— Nenhum —</option></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Observações</label>
        <input type="text" id="tx-notes" class="form-control" placeholder="Opcional">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn--ghost" data-close-modal>Cancelar</button>
      <button class="btn btn--primary" id="tx-save-btn">Salvar</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuthAndRender } from './js/nav.js';
  import { transactionsApi, categoriesApi, accountsApi, cardsApi } from './js/api.js';
  import { formatBRL, formatDate, formatMonth, currentYearMonth, paymentLabel, toast, confirm, openModal, closeModal, setupModalClose, fillSelect } from './js/utils.js';

  if (!requireAuthAndRender('transactions.html')) throw new Error('not auth');

  let { year, month } = currentYearMonth();
  let skip = 0;
  const LIMIT = 50;
  let editId = null;
  let categories = [], accounts = [], cards = [];

  // ── Load refs ─────────────────────────────────────────────────────
  async function loadRefs() {
    [categories, accounts, cards] = await Promise.all([
      categoriesApi.list().catch(() => []),
      accountsApi.list().catch(() => []),
      cardsApi.list().catch(() => []),
    ]);
    fillSelect(document.getElementById('filter-category'), categories, 'id', 'name', 'Todas as categorias');
    fillSelect(document.getElementById('tx-category'), categories, 'id', 'name', '— Nenhuma —');
    fillSelect(document.getElementById('tx-account'), accounts, 'id', 'name', '— Nenhuma —');
    fillSelect(document.getElementById('tx-card'), cards, 'id', 'name', '— Nenhum —');
  }

  function catName(id) { return categories.find(c => c.id === id)?.name || '—'; }

  function updateMonthLabel() {
    const lbl = formatMonth(year, month);
    document.getElementById('month-label').textContent = lbl.charAt(0).toUpperCase() + lbl.slice(1);
  }

  async function loadTransactions() {
    const tbody = document.getElementById('tx-tbody');
    tbody.innerHTML = `<tr><td colspan="8" style="padding:24px;text-align:center;color:var(--text-3)">Carregando...</td></tr>`;

    const params = { year, month, skip, limit: LIMIT };
    const type = document.getElementById('filter-type').value;
    const cat = document.getElementById('filter-category').value;
    const pm  = document.getElementById('filter-payment').value;
    const q   = document.getElementById('search-input').value;

    if (type) params.type = type;
    if (cat) params.category_id = cat;
    if (pm) params.payment_method = pm;
    if (q) params.search = q;

    try {
      const res = await transactionsApi.list(params);
      const items = res.items;

      // Summary
      let income = 0, expense = 0;
      items.forEach(t => { if (t.type === 'income') income += t.amount; else expense += t.amount; });
      document.getElementById('sum-income').textContent = formatBRL(income);
      document.getElementById('sum-expense').textContent = formatBRL(expense);
      const bal = income - expense;
      const balEl = document.getElementById('sum-balance');
      balEl.textContent = formatBRL(bal);
      balEl.style.color = bal >= 0 ? 'var(--em)' : 'var(--red)';

      document.getElementById('pag-info').textContent =
        `${skip + 1}–${Math.min(skip + items.length, res.total)} de ${res.total}`;
      document.getElementById('pag-prev').disabled = skip === 0;
      document.getElementById('pag-next').disabled = skip + LIMIT >= res.total;

      if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="8" style="padding:40px;text-align:center;color:var(--text-3)">Nenhuma transação encontrada.</td></tr>`;
        return;
      }

      tbody.innerHTML = items.map(t => {
        const inst = t.installments_total > 1
          ? `<span class="badge badge--info">${t.installment_number}/${t.installments_total}</span>`
          : '—';
        return `
          <tr>
            <td class="text-muted">${formatDate(t.date)}</td>
            <td class="text-strong">${t.description}</td>
            <td><span class="color-dot" style="background:${categories.find(c=>c.id===t.category_id)?.color||'#6B7280'};margin-right:6px"></span>${catName(t.category_id)}</td>
            <td class="text-muted">${paymentLabel(t.payment_method)}</td>
            <td>${inst}</td>
            <td class="td-amount td-amount--${t.type} text-right">${t.type === 'income' ? '+' : '-'}${formatBRL(t.amount)}</td>
            <td>${t.type === 'income' ? '<span class="badge badge--income">Receita</span>' : '<span class="badge badge--expense">Despesa</span>'}</td>
            <td class="td-actions">
              <button class="btn btn--ghost btn--sm" onclick="editTx('${t.id}')">✎</button>
              <button class="btn btn--ghost btn--sm" style="color:var(--red)" onclick="deleteTx('${t.id}','${t.installments_total}')">✕</button>
            </td>
          </tr>`;
      }).join('');
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="8" style="padding:24px;text-align:center;color:var(--red)">${err.message}</td></tr>`;
    }
  }

  // ── Edit / Delete (exposed to window for inline onclick) ──────────
  window.editTx = async (id) => {
    try {
      const t = await transactionsApi.get(id);
      editId = id;
      document.getElementById('tx-modal-title').textContent = 'Editar Transação';
      document.getElementById('tx-date').value = t.date;
      document.getElementById('tx-type').value = t.type;
      document.getElementById('tx-desc').value = t.description;
      document.getElementById('tx-amount').value = t.amount;
      document.getElementById('tx-payment').value = t.payment_method;
      document.getElementById('tx-category').value = t.category_id || '';
      document.getElementById('tx-account').value = t.account_id || '';
      document.getElementById('tx-card').value = t.card_id || '';
      document.getElementById('tx-notes').value = t.notes || '';
      document.getElementById('tx-installments').value = 1;
      openModal('tx-modal');
    } catch (err) { toast(err.message, 'error'); }
  };

  window.deleteTx = async (id, totalInst) => {
    let deleteAll = false;
    if (+totalInst > 1) {
      const choice = await confirm(`Esta transação tem ${totalInst} parcelas. Deseja excluir TODAS as parcelas?`);
      if (choice === null) return;
      deleteAll = choice;
    } else {
      if (!await confirm('Excluir esta transação?')) return;
    }
    try {
      await transactionsApi.delete(id, deleteAll);
      toast('Transação excluída.', 'success');
      loadTransactions();
    } catch (err) { toast(err.message, 'error'); }
  };

  // ── Save modal ────────────────────────────────────────────────────
  document.getElementById('tx-save-btn').onclick = async () => {
    const btn = document.getElementById('tx-save-btn');
    btn.disabled = true;
    try {
      const body = {
        date: document.getElementById('tx-date').value,
        description: document.getElementById('tx-desc').value,
        amount: parseFloat(document.getElementById('tx-amount').value),
        type: document.getElementById('tx-type').value,
        payment_method: document.getElementById('tx-payment').value,
        category_id: document.getElementById('tx-category').value || null,
        account_id: document.getElementById('tx-account').value || null,
        card_id: document.getElementById('tx-card').value || null,
        notes: document.getElementById('tx-notes').value || null,
        installments: parseInt(document.getElementById('tx-installments').value),
      };

      if (editId) {
        await transactionsApi.update(editId, body);
        toast('Transação atualizada.', 'success');
      } else {
        await transactionsApi.create(body);
        const inst = body.installments;
        toast(inst > 1 ? `${inst} parcelas criadas com sucesso!` : 'Transação criada.', 'success');
      }
      closeModal('tx-modal');
      loadTransactions();
    } catch (err) { toast(err.message, 'error'); } finally { btn.disabled = false; }
  };

  // ── Open new tx modal ─────────────────────────────────────────────
  document.getElementById('btn-new-tx').onclick = () => {
    editId = null;
    document.getElementById('tx-modal-title').textContent = 'Nova Transação';
    document.getElementById('tx-date').value = new Date().toISOString().slice(0, 10);
    document.getElementById('tx-desc').value = '';
    document.getElementById('tx-amount').value = '';
    document.getElementById('tx-payment').value = 'pix';
    document.getElementById('tx-category').value = '';
    document.getElementById('tx-account').value = '';
    document.getElementById('tx-card').value = '';
    document.getElementById('tx-notes').value = '';
    document.getElementById('tx-installments').value = '1';
    openModal('tx-modal');
  };

  setupModalClose('tx-modal');

  // ── Filters & pagination ──────────────────────────────────────────
  document.getElementById('prev-month').onclick = () => { month--; if (month < 1) { month = 12; year--; } skip = 0; updateMonthLabel(); loadTransactions(); };
  document.getElementById('next-month').onclick = () => { month++; if (month > 12) { month = 1; year++; } skip = 0; updateMonthLabel(); loadTransactions(); };
  document.getElementById('pag-prev').onclick = () => { skip = Math.max(0, skip - LIMIT); loadTransactions(); };
  document.getElementById('pag-next').onclick = () => { skip += LIMIT; loadTransactions(); };
  ['filter-type','filter-category','filter-payment'].forEach(id => {
    document.getElementById(id).onchange = () => { skip = 0; loadTransactions(); };
  });
  let searchTimer;
  document.getElementById('search-input').oninput = () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { skip = 0; loadTransactions(); }, 400);
  };

  updateMonthLabel();
  await loadRefs();
  loadTransactions();
</script>
</body>
</html>
