<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatórios — Save Point Finanças</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="app-shell">
  <div id="sidebar-mount"></div>
  <div class="main-content">
    <div class="page-header">
      <div class="page-title">Relatórios</div>
      <div class="page-actions">
        <div class="month-nav">
          <button class="btn btn--ghost btn--sm" id="prev-month">‹</button>
          <div class="month-nav-label" id="month-label">—</div>
          <button class="btn btn--ghost btn--sm" id="next-month">›</button>
        </div>
      </div>
    </div>

    <div class="page-body">
      <!-- Summary row -->
      <div class="stat-grid" style="margin-bottom:24px">
        <div class="stat-card stat-card--income">
          <div class="stat-label">Receitas</div>
          <div class="stat-value stat-value--income" id="rep-income">—</div>
        </div>
        <div class="stat-card stat-card--expense">
          <div class="stat-label">Despesas</div>
          <div class="stat-value stat-value--expense" id="rep-expense">—</div>
        </div>
        <div class="stat-card stat-card--balance">
          <div class="stat-label">Saldo</div>
          <div class="stat-value" id="rep-balance">—</div>
        </div>
      </div>

      <!-- Row 1: Evo + Donut -->
      <div class="grid-2" style="margin-bottom:20px">
        <div class="card">
          <div class="card-header">
            <div class="card-title">Evolução — últimos 12 meses</div>
          </div>
          <div class="chart-area" style="height:240px">
            <canvas id="evo-chart"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-title">Despesas por categoria</div>
            <select id="cat-type-filter" class="filter-control">
              <option value="expense">Despesas</option>
              <option value="income">Receitas</option>
            </select>
          </div>
          <div class="chart-area" style="height:240px;display:flex;align-items:center;justify-content:center">
            <canvas id="cat-chart"></canvas>
          </div>
        </div>
      </div>

      <!-- Row 2: Top transactions + category list -->
      <div class="grid-2">
        <div class="card">
          <div class="card-header">
            <div class="card-title">Maiores despesas do mês</div>
          </div>
          <div class="table-wrapper" style="border:none">
            <table>
              <thead>
                <tr><th>#</th><th>Descrição</th><th style="text-align:right">Valor</th></tr>
              </thead>
              <tbody id="top-tbody">
                <tr><td colspan="3" style="padding:20px;text-align:center;color:var(--text-3)">Carregando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-title">Ranking por categoria</div>
          </div>
          <div id="cat-ranking" style="display:flex;flex-direction:column;gap:10px">
            <div style="color:var(--text-3);font-size:0.8rem;text-align:center;padding:20px">Carregando...</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuthAndRender } from './js/nav.js';
  import { reportsApi } from './js/api.js';
  import { formatBRL, formatMonth, currentYearMonth, monthLabel } from './js/utils.js';

  if (!requireAuthAndRender('reports.html')) throw new Error('not auth');

  let { year, month } = currentYearMonth();
  let evoChart, catChart;

  function updateMonthLabel() {
    const lbl = formatMonth(year, month);
    document.getElementById('month-label').textContent = lbl.charAt(0).toUpperCase() + lbl.slice(1);
  }

  async function loadSummary() {
    try {
      const s = await reportsApi.summary(year, month);
      document.getElementById('rep-income').textContent = formatBRL(s.income);
      document.getElementById('rep-expense').textContent = formatBRL(s.expenses);
      const balEl = document.getElementById('rep-balance');
      balEl.textContent = formatBRL(s.balance);
      balEl.className = 'stat-value ' + (s.balance >= 0 ? 'stat-value--income' : 'stat-value--expense');
    } catch {}
  }

  async function loadEvolution() {
    if (evoChart) evoChart.destroy();
    try {
      const data = await reportsApi.monthlyEvolution(12);
      const labels = data.map(d => monthLabel(d.period));
      evoChart = new Chart(document.getElementById('evo-chart'), {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'Receitas',
              data: data.map(d => d.income),
              borderColor: '#00E57A',
              backgroundColor: 'rgba(0,229,122,0.08)',
              borderWidth: 2,
              pointRadius: 3,
              tension: 0.3,
              fill: true,
            },
            {
              label: 'Despesas',
              data: data.map(d => d.expenses),
              borderColor: '#FF4D65',
              backgroundColor: 'rgba(255,77,101,0.07)',
              borderWidth: 2,
              pointRadius: 3,
              tension: 0.3,
              fill: true,
            },
          ],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: '#8FA3B8', font: { size: 11 } } },
            tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${formatBRL(ctx.raw)}` } },
          },
          scales: {
            x: { grid: { color: '#1E2D3D' }, ticks: { color: '#556070', font: { size: 10 } } },
            y: { grid: { color: '#1E2D3D' }, ticks: { color: '#556070', font: { size: 10 }, callback: v => 'R$' + (v/1000).toFixed(0) + 'k' } },
          },
        },
      });
    } catch {}
  }

  async function loadCategoryChart() {
    if (catChart) catChart.destroy();
    const type = document.getElementById('cat-type-filter').value;
    try {
      const data = await reportsApi.byCategory(year, month, type);
      if (!data.length) return;

      catChart = new Chart(document.getElementById('cat-chart'), {
        type: 'doughnut',
        data: {
          labels: data.map(d => d.name),
          datasets: [{
            data: data.map(d => d.total),
            backgroundColor: data.map(d => d.color + 'CC'),
            borderColor: data.map(d => d.color),
            borderWidth: 1,
          }],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          cutout: '65%',
          plugins: {
            legend: { position: 'right', labels: { color: '#8FA3B8', font: { size: 10 }, boxWidth: 12, padding: 8 } },
            tooltip: { callbacks: { label: ctx => `${ctx.label}: ${formatBRL(ctx.raw)}` } },
          },
        },
      });

      // Also update ranking list
      const total = data.reduce((a, d) => a + d.total, 0);
      const ranking = document.getElementById('cat-ranking');
      ranking.innerHTML = data.slice(0, 10).map(d => {
        const pct = Math.round((d.total / total) * 100);
        return `
          <div>
            <div style="display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:4px">
              <div style="display:flex;align-items:center;gap:6px">
                <span class="color-dot" style="background:${d.color}"></span>
                <span style="color:var(--text)">${d.name}</span>
                <span class="text-muted">(${d.count} lançamentos)</span>
              </div>
              <span class="mono" style="color:var(--text)">${formatBRL(d.total)}</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${pct}%;background:${d.color}"></div>
            </div>
          </div>`;
      }).join('');
    } catch {}
  }

  async function loadTopTransactions() {
    const tbody = document.getElementById('top-tbody');
    try {
      const data = await reportsApi.topTransactions(year, month, 10);
      if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="3" style="padding:20px;text-align:center;color:var(--text-3)">Sem despesas neste mês.</td></tr>`;
        return;
      }
      tbody.innerHTML = data.map((t, i) => `
        <tr>
          <td style="color:var(--text-3);font-weight:700">${i + 1}</td>
          <td class="text-strong">${t.description}</td>
          <td class="td-amount td-amount--expense text-right">${formatBRL(t.amount)}</td>
        </tr>`).join('');
    } catch {}
  }

  async function loadAll() {
    updateMonthLabel();
    await Promise.all([loadSummary(), loadEvolution(), loadCategoryChart(), loadTopTransactions()]);
  }

  document.getElementById('prev-month').onclick = () => { month--; if (month < 1) { month = 12; year--; } loadAll(); };
  document.getElementById('next-month').onclick = () => { month++; if (month > 12) { month = 1; year++; } loadAll(); };
  document.getElementById('cat-type-filter').onchange = loadCategoryChart;

  loadAll();
</script>
</body>
</html>
