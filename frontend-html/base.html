<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="description" content="SavePoint Finance - Controle suas finanças pessoais">
  <meta name="theme-color" content="#080B10">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>{% block title %}SavePoint Finance{% endblock %}</title>
  
  <!-- Preconnect para performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  
  <!-- CSS crítico inline para first paint - versão completa -->
  <style>
    :root {
      --accent: #00E57A;
      --bg: #080B10;
      --bg-2: #0A0E14;
      --card: #0F1419;
      --secondary: #141C24;
      --border: rgba(255,255,255,0.06);
      --text: #E8EDF2;
      --text-dim: #8B9BB4;
      --income: #00E57A;
      --expense: #FF4D6A;
      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 14px;
      --sidebar-w: 240px;
      --header-h: 56px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -webkit-overflow-scrolling: touch;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }
    input, select, textarea { font-family: inherit; }
    svg { display: block; }
    
    /* App Shell */
    .app-shell { display: flex; min-height: 100vh; }
    
    .main-content {
      flex: 1;
      min-width: 0;
      margin-left: var(--sidebar-w);
      display: flex;
      flex-direction: column;
      transition: margin-left 0.3s ease;
    }
    
    .page-body {
      flex: 1;
      padding: 24px 28px;
    }
    
    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w);
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      background: #080C12;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 50;
      overflow-y: auto;
    }
    
    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }
    
    /* Stats Grid */
    .stats-grid { 
      display: grid; 
      grid-template-columns: repeat(4, 1fr); 
      gap: 16px; 
      margin-bottom: 24px;
    }
    
    /* Flex helpers */
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .gap-4 { gap: 16px; }
    
    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.875rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      min-width: 260px;
      max-width: 380px;
      transform: translateX(120%);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    
    .toast--show { transform: translateX(0); }
    .toast--success { border-left: 3px solid var(--income); }
    .toast--error { border-left: 3px solid var(--expense); }
    .toast--warning { border-left: 3px solid #F59E0B; }
    .toast--info { border-left: 3px solid #3B9EFF; }
    .toast-icon { font-size: 1rem; }
    .toast-message { flex: 1; }
    
    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }
    
    .modal-overlay.modal--open { opacity: 1; visibility: visible; }
    
    .modal-box {
      width: 100%;
      max-width: 500px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      transform: translateY(12px);
      transition: transform 0.25s ease;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal-overlay.modal--open .modal-box { transform: translateY(0); }
    
    /* Header */
    .top-header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,11,16,0.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 30;
    }
    
    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 16px;
      height: 36px;
      border-radius: var(--radius-sm);
      font-size: 0.8125rem;
      font-weight: 500;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.18s ease;
      white-space: nowrap;
      background: var(--accent);
      color: #050A07;
    }
    
    .btn--secondary {
      background: var(--secondary);
      color: var(--text);
      border-color: var(--border);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .main-content { margin-left: 0; }
      .sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
      .sidebar.open { transform: translateX(0); }
      .page-body { padding: 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .modal-box { max-width: 100%; border-radius: var(--radius); }
      .toast-container { left: 12px; right: 12px; bottom: 12px; }
      .toast { min-width: 0; max-width: 100%; }
    }
    
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
    }
    
    /* Sidebar toggle */
    .sidebar-toggle { display: none; }
    @media (max-width: 768px) {
      .sidebar-toggle { 
        display: flex; 
        width: 34px; 
        height: 34px; 
        border-radius: 8px; 
        background: none; 
        border: 1px solid var(--border); 
        color: var(--text-dim); 
        align-items: center; 
        justify-content: center; 
        cursor: pointer;
      }
    }
    
    /* Overlay */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 40;
    }
    .sidebar-overlay.open { display: block; }
  </style>
  
  <!-- Fontes (Sincronas para evitar flash of unstyled text) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@0.525.0/dist/umd/lucide.js"></script>
  
  <!-- CSS principal -->
  <link rel="stylesheet" href="/css/styles.css">
  
  <style>[x-cloak] { display: none !important; }</style>
  
  <!-- HTMX com defer -->
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js" defer></script>
  
  <!-- API & Auth -->
  <script src="/js/api.js"></script>
  
  {% block head %}{% endblock %}
</head>
<body>

<!-- Mobile sidebar overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="app-shell">
  {% include "partials/_sidebar.html" %}

  <div class="main-content">
    <!-- Top Header -->
    <header class="top-header">
      <div class="header-left">
        <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle menu">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <span class="header-breadcrumb">{% block breadcrumb %}{% endblock %}</span>
      </div>
      <div class="header-right">
        <div style="position: relative;">
          <button 
            class="icon-btn" 
            title="Notificações" 
            aria-label="Notificações"
            hx-get="/notifications"
            hx-target="#notifications-container"
            hx-swap="innerHTML"
            onclick="toggleNotifications(this)"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span class="notif-dot" id="notif-badge" style="display: none;"></span>
          </button>
          <div id="notifications-container" style="position: absolute; top: 100%; right: 0; z-index: 100;"></div>
        </div>
        <a href="/options" class="icon-btn" title="Configurações" aria-label="Configurações">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/>
          </svg>
        </a>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-body" id="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>

<!-- Global Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-content"></div>
</div>

<!-- Toast Container -->
<div class="toast-container" aria-live="polite"></div>

<script>
/* ── Sidebar toggle (mobile) ────────────────────────────────────────── */
function toggleSidebar() {
  const sidebar = document.getElementById('appSidebar');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
}

function closeSidebar() {
  document.getElementById('appSidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

/* ── Notifications ─────────────────────────────────────────────────── */
let notificationsOpen = false;

function toggleNotifications(btn) {
  const container = document.getElementById('notifications-container');
  if (notificationsOpen) {
    container.innerHTML = '';
    notificationsOpen = false;
  } else {
    if (!container.innerHTML) {
      htmx.trigger(btn, 'hx:get');
    }
    notificationsOpen = true;
  }
}

document.addEventListener('click', function(e) {
  const container = document.getElementById('notifications-container');
  const btn = container.parentElement.querySelector('button');
  if (notificationsOpen && !container.contains(e.target) && !btn.contains(e.target)) {
    container.innerHTML = '';
    notificationsOpen = false;
  }
});

/* ── Modal system ───────────────────────────────────────────────────── */
const modalOverlay = document.getElementById('modal-overlay');

function openModal()  { modalOverlay.classList.add('modal--open'); }
function closeModal() { modalOverlay.classList.remove('modal--open'); }

window.addEventListener('sp:openModal',  openModal);
window.addEventListener('sp:closeModal', closeModal);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && modalOverlay.classList.contains('modal--open')) closeModal();
});

/* ── HTMX Error Handling ────────────────────────────────────────────── */
document.body.addEventListener('htmx:responseError', function(evt) {
  const response = evt.detail.response;
  if (response.status === 401) {
    window.location.href = '/login?expired=1';
    evt.preventDefault();
    return;
  }
  // Show JSON errors as toasts
  if (response.headers && response.headers.get('content-type')?.includes('application/json')) {
    response.clone().json().then(data => {
      if (data.error) {
        addToast({ message: data.error, kind: 'error' });
        evt.preventDefault();
      }
    }).catch(() => {});
  }
});

/* ── Global fetch error handling ────────────────────────────────────── */
window.addEventListener('unhandledrejection', function(evt) {
  if (evt.reason?.response?.status === 401) {
    window.location.href = '/login?expired=1';
  }
});

/* ── Delete confirmation ─────────────────────────────────────────────── */
function confirmDelete(url, message) {
  if (!confirm(message + '\n\nEsta ação não pode ser desfeita.')) return;
  fetch(url, { method: 'POST' })
    .then(r => {
      if (r.ok) {
        location.reload();
      } else {
        return r.json().then(err => { throw new Error(err.error || 'Erro ao excluir'); });
      }
    })
    .catch(err => alert(err.message));
}

/* ── HTMX modal integration ─────────────────────────────────────────── */
document.body.addEventListener('htmx:afterSwap', e => {
  if (e.target && e.target.id === 'modal-content') openModal();
});

/* ── Toast system ───────────────────────────────────────────────────── */
const toastContainer = document.querySelector('.toast-container');

function addToast({ message, kind = 'success', duration = 4000 }) {
  const icons = {
    success: '✓',
    error: '✕',
    warning: '⚠',
    info: 'ℹ'
  };
  const toast = document.createElement('div');
  toast.className = `toast toast--${kind}`;
  toast.innerHTML = `
    <span class="toast-icon">${icons[kind] || 'ℹ'}</span>
    <span class="toast-message">${message}</span>
  `;
  toastContainer.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('toast--show'));
  setTimeout(() => {
    toast.classList.remove('toast--show');
    setTimeout(() => toast.remove(), 400);
  }, duration);
}

// Função global para exibir erros de API
window.showApiError = function(error, defaultMsg = 'Ocorreu um erro') {
  let message = defaultMsg;
  let kind = 'error';
  
  if (error?.message) {
    // Erro da API
    message = error.message;
    // Detectar tipo de erro pelo código
    if (error.status === 401) {
      message = 'Sua sessão expirou. Faça login novamente.';
      kind = 'warning';
    } else if (error.status === 403) {
      message = 'Você não tem permissão para esta ação.';
    } else if (error.status === 404) {
      message = 'Item não encontrado.';
    } else if (error.status === 400) {
      message = error.message;
      kind = 'warning';
    } else if (error.status >= 500) {
      message = 'Erro no servidor. Tente novamente mais tarde.';
    }
  } else if (typeof error === 'string') {
    message = error;
  }
  
  addToast({ message, kind });
};

/* ── HTMX response handling ─────────────────────────────────────────── */
document.body.addEventListener('htmx:afterRequest', e => {
  const raw = e.detail.xhr?.getResponseHeader('HX-Trigger');
  if (!raw) return;
  try {
    const t = JSON.parse(raw);
    if (t['sp:toast'])      addToast(t['sp:toast']);
    if (t['sp:closeModal']) closeModal();
    if (t['sp:openModal'])  openModal();
  } catch {}
});

document.body.addEventListener('htmx:afterSwap', e => {
  const raw = e.detail.xhr?.getResponseHeader('HX-Trigger-After-Swap');
  if (!raw) return;
  try {
    const events = JSON.parse(raw);
    for (const [name, detail] of Object.entries(events))
      window.dispatchEvent(new CustomEvent(name, { detail }));
  } catch {}
});

document.body.addEventListener('htmx:beforeSwap', e => {
  if (e.detail.xhr.status >= 400) {
    e.detail.shouldSwap = true;
    e.detail.target = document.getElementById('modal-content');
  }
});

document.body.addEventListener('htmx:responseError', e => {
  const status = e.detail.xhr?.status;
  let message = 'Ocorreu um erro';
  
  try {
    const response = JSON.parse(e.detail.xhr.responseText);
    message = response.detail || response.message || message;
  } catch {}
  
  if (status === 401) {
    message = 'Sua sessão expirou. Faça login novamente.';
    Auth.clear();
    window.location.href = '/login';
  } else if (status === 403) {
    message = 'Você não tem permissão para esta ação.';
  } else if (status === 404) {
    message = 'Item não encontrado.';
  } else if (status >= 500) {
    message = 'Erro no servidor. Tente novamente mais tarde.';
  }
  
  addToast({ message, kind: 'error' });
});

/* ── Dashboard refresh ──────────────────────────────────────────────── */
window.addEventListener('sp:refreshDashboard', () => {
  if (window.location.pathname === '/dashboard')
    htmx.ajax('GET', '/dashboard', { target: '#main-content', swap: 'innerHTML' });
});

/* ── Toggle switch ──────────────────────────────────────────────────── */
function toggleSwitch(el) {
  el.classList.toggle('on');
  const input = el.previousElementSibling;
  if (input) input.value = el.classList.contains('on') ? '1' : '0';
}

/* ── Month navigation ───────────────────────────────────────────────── */
function changeMonth(delta) {
  const url = new URL(window.location);
  let m = parseInt(url.searchParams.get('month') || '{{ now.month if now else "1" }}');
  let y = parseInt(url.searchParams.get('year')  || '{{ now.year  if now else "2026" }}');
  m += delta;
  if (m < 1) { m = 12; y--; }
  if (m > 12) { m = 1;  y++; }
  url.searchParams.set('month', m);
  url.searchParams.set('year',  y);
  window.location = url.toString();
}

/* ── Premium Interactions ──────────────────────────────────────────────── */

// Smooth scroll reveal
const revealOnScroll = () => {
  const reveals = document.querySelectorAll('.reveal');
  reveals.forEach(el => {
    const windowHeight = window.innerHeight;
    const elementTop = el.getBoundingClientRect().top;
    const elementVisible = 100;
    if (elementTop < windowHeight - elementVisible) {
      el.classList.add('visible');
    }
  });
};

window.addEventListener('scroll', revealOnScroll);
document.addEventListener('DOMContentLoaded', revealOnScroll);

// Stagger animation for list items
document.querySelectorAll('[data-stagger]').forEach((container, i) => {
  container.querySelectorAll(':scope > *').forEach((child, j) => {
    child.style.animationDelay = `${(i + j) * 0.05}s`;
    child.classList.add('stagger-item');
  });
});

// Add ripple effect to buttons
document.querySelectorAll('.btn, .icon-btn, .tab-btn, .tab-pill').forEach(btn => {
  btn.classList.add('ripple');
});

// Animate numbers on page load
document.querySelectorAll('[data-count]').forEach(el => {
  const target = parseFloat(el.dataset.count);
  const duration = 1500;
  const start = performance.now();
  
  const animate = (now) => {
    const progress = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3); // ease-out-cubic
    const current = target * eased;
    el.textContent = target % 1 === 0 
      ? Math.floor(current).toLocaleString('pt-BR')
      : current.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    
    if (progress < 1) requestAnimationFrame(animate);
  };
  
  requestAnimationFrame(animate);
});

// Progress bar animation
document.querySelectorAll('.progress-bar[data-progress]').forEach(bar => {
  const progress = bar.dataset.progress;
  setTimeout(() => {
    bar.style.width = `${progress}%`;
  }, 300);
});

// Card hover sound effect (optional - disabled by default)
const playHoverSound = () => {
  // Can be enabled for accessibility or preference
  // const audio = new Audio('/sounds/hover.mp3');
  // audio.volume = 0.1;
  // audio.play().catch(() => {});
};


// Form validation feedback
document.querySelectorAll('form').forEach(form => {
  form.addEventListener('submit', (e) => {
    const submitBtn = form.querySelector('button[type="submit"]');
    if (submitBtn && !form.checkValidity()) {
      submitBtn.classList.add('shake');
      setTimeout(() => submitBtn.classList.add('shake'), 500);
    }
  });
});

// Sidebar active link animation
document.querySelectorAll('.nav-link').forEach(link => {
  link.addEventListener('mouseenter', () => {
    link.style.transform = 'translateX(4px)';
  });
  link.addEventListener('mouseleave', () => {
    link.style.transform = '';
  });
});

// Add focus trap for modals
document.addEventListener('keydown', (e) => {
  if (!modalOverlay.classList.contains('modal--open')) return;
  
  const focusable = modalOverlay.querySelectorAll(
    'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
  );
  const first = focusable[0];
  const last = focusable[focusable.length - 1];
  
  if (e.key === 'Tab') {
    if (e.shiftKey && document.activeElement === first) {
      e.preventDefault();
      last.focus();
    } else if (!e.shiftKey && document.activeElement === last) {
      e.preventDefault();
      first.focus();
    }
  }
});

// Lazy load images with fade-in
document.querySelectorAll('img[data-src]').forEach(img => {
  img.src = img.dataset.src;
  img.onload = () => img.classList.add('loaded');
  img.onerror = () => {
    img.src = '/static/img/placeholder.svg';
    img.classList.add('error');
  };
});

// Add loading state to links
document.querySelectorAll('a[hx-get], a[href]').forEach(link => {
  link.addEventListener('click', function(e) {
    if (this.href && !this.href.startsWith('#') && !this.target) {
      this.style.opacity = '0.7';
      this.style.pointerEvents = 'none';
    }
  });
});

// Initialize Lucide icons with animation
document.addEventListener('DOMContentLoaded', () => {
  if (typeof lucide !== 'undefined') {
    lucide.createIcons({
      attrs: {
        'stroke-width': 2,
        'stroke': 'currentColor'
      }
    });
  }
});

// Debounced resize handler
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    // Trigger any responsive adjustments
    document.body.classList.add('resize-complete');
  }, 200);
});

// Console branding
console.log(
  '%c💰 SavePoint Finance',
  'font-size: 20px; font-weight: bold; color: #00E57A; text-shadow: 0 0 10px rgba(0,229,122,0.5);'
);
console.log('%c✨ Premium UI Loaded', 'color: #8B9BB4;');
</script>

{% block scripts %}{% endblock %}
</body>
</html>
