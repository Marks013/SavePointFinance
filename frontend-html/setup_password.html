<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Definir Senha — SavePoint Finance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo__mark">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div class="auth-logo__title">Definir Senha</div>
      <div class="auth-logo__sub">Crie uma senha segura para sua conta</div>
    </div>

    <div class="auth-form-card">
      {% if error %}
      <div class="badge badge--expense" style="width:100%; margin-bottom:16px; padding: 10px 14px; border-radius: 8px; font-size:0.8125rem; text-transform:none; letter-spacing:0;">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/setup-password" class="form-stack">
        {% if token %}
        <input type="hidden" name="token" value="{{ token }}">
        {% endif %}

        <div class="form-group">
          <label class="form-label" for="password">Nova senha</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" name="password" class="form-input form-input--icon" placeholder="Mínimo 8 caracteres" required autocomplete="new-password">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm">Confirmar nova senha</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="confirm" name="confirm" class="form-input form-input--icon" placeholder="Repita a senha" required autocomplete="new-password">
          </div>
        </div>

        <div style="background:var(--secondary); border-radius:8px; padding:12px 14px; font-size:0.75rem; color:var(--text-dim);">
          <p style="font-weight:600; color:var(--text); margin-bottom:4px;">Requisitos da senha:</p>
          <p>• Mínimo 8 caracteres</p>
          <p>• Letras e números recomendados</p>
        </div>

        <button type="submit" class="btn btn--primary btn--lg btn--w-full">
          Salvar senha
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
