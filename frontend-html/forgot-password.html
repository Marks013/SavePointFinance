<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Recuperar Senha — SavePoint Finance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    @media (max-width: 480px) {
      .auth-page { padding: 16px; }
      .auth-form-card { padding: 20px; }
      .auth-logo__mark { width: 44px; height: 44px; }
      .auth-logo__title { font-size: 1.25rem; }
    }
    
    .auth-card {
      animation: authCardEnter 0.6s var(--transition-bounce);
    }
    
    @keyframes authCardEnter {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    .auth-logo__mark {
      animation: logoFloat 4s ease-in-out infinite;
    }
    
    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    
    .form-input {
      transition: all 0.3s ease;
    }
    
    .form-input:focus {
      transform: translateY(-2px);
    }
    
    .btn--primary {
      position: relative;
      overflow: hidden;
    }
    
    .btn--primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .btn--primary:hover::before {
      opacity: 1;
    }
    
    .btn--primary:active {
      transform: scale(0.98);
    }

    .success-message {
      padding: 16px;
      background: rgba(0,229,122,0.1);
      border: 1px solid rgba(0,229,122,0.3);
      border-radius: 8px;
      color: var(--income);
      font-size: 0.875rem;
      margin-bottom: 16px;
    }

    .error-message {
      padding: 16px;
      background: rgba(255,77,106,0.1);
      border: 1px solid rgba(255,77,106,0.3);
      border-radius: 8px;
      color: var(--expense);
      font-size: 0.875rem;
      margin-bottom: 16px;
    }

    .success-message {
      padding: 16px;
      background: rgba(0,229,122,0.1);
      border: 1px solid rgba(0,229,122,0.3);
      border-radius: 8px;
      color: var(--income);
      font-size: 0.875rem;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo__mark pulse-glow">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="1" x2="12" y2="23"/>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
      </div>
      <div class="auth-logo__title">Recuperar Senha</div>
      <div class="auth-logo__sub">Informe seu e-mail para recuperar</div>
    </div>

    <!-- Card -->
    <div class="auth-form-card">
      {% if success %}
      <div class="success-message">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;flex-shrink:0;margin-right:8px;vertical-align:middle;">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        {{ success }}
      </div>
      <p style="text-align:center; font-size:0.875rem; color:var(--text-dim); margin-bottom:20px;">
        Verifique sua caixa de spam se não receber em alguns minutos.
      </p>
      <a href="/login" class="btn btn--primary btn--lg btn--w-full" style="display:flex; align-items:center; justify-content:center; gap:8px;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        Voltar ao Login
      </a>
      {% else %}
      {% if error %}
      <div class="error-message">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;flex-shrink:0;margin-right:8px;vertical-align:middle;">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/forgot-password" class="form-stack" id="forgotForm">
        <div class="form-group">
          <label class="form-label" for="email">E-mail da sua conta</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input form-input--icon"
              placeholder="seu@email.com"
              required
              autocomplete="email"
              data-validate="email"
            >
          </div>
          <span class="form-error" id="emailError"></span>
        </div>

        <button type="submit" class="btn btn--primary btn--lg btn--w-full" style="margin-top:4px;">
          <span class="btn-text">Enviar Link de Recuperação</span>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </form>

      <p style="text-align:center; font-size:0.8125rem; color:var(--text-dim); margin-top:18px;">
        <a href="/login" style="color:var(--text-dim); transition:color 0.15s;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-dim)'">
          Lembrou a senha? <strong>Entrar</strong>
        </a>
      </p>
      {% endif %}
    </div>
  </div>
</div>

<script>
// Form Validation
const forgotForm = document.getElementById('forgotForm');
if (forgotForm) {
  const emailInput = document.getElementById('email');
  const emailError = document.getElementById('emailError');

  function validateEmail(value) {
    if (!value) return 'E-mail é obrigatório';
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(value)) return 'E-mail inválido';
    return null;
  }

  emailInput.addEventListener('blur', function() {
    const error = validateEmail(this.value);
    if (error) {
      this.classList.add('is-invalid');
      emailError.textContent = error;
      emailError.style.display = 'block';
    } else {
      this.classList.remove('is-invalid');
      this.classList.add('is-valid');
      emailError.textContent = '';
      emailError.style.display = 'none';
    }
  });

  emailInput.addEventListener('input', function() {
    if (this.classList.contains('is-invalid')) {
      const error = validateEmail(this.value);
      if (!error) {
        this.classList.remove('is-invalid');
        this.classList.add('is-valid');
        emailError.textContent = '';
        emailError.style.display = 'none';
      }
    }
  });

  forgotForm.addEventListener('submit', function(e) {
    const emailValidation = validateEmail(emailInput.value);
    if (emailValidation) {
      e.preventDefault();
      emailInput.classList.add('is-invalid');
      emailError.textContent = emailValidation;
      emailError.style.display = 'block';
    }
  });
}
</script>
</body>
</html>
