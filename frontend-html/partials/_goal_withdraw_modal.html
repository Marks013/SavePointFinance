<!-- _goal_withdraw_modal.html -->
<div class="modal-header">
  <span class="modal-title">Sacar da Meta</span>
  <button class="modal-close" onclick="closeModal()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>

<form
  method="POST"
  action="/goals/{{ goal.id }}/withdraw"
  hx-post="/goals/{{ goal.id }}/withdraw"
  hx-target="body"
  hx-swap="none"
  hx-on::after-request="if(event.detail.successful) { closeModal(); location.reload(); }"
  class="modal-body"
>
  <!-- Goal info -->
  <div style="background:var(--secondary); border-radius:10px; padding:16px; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between;">
    <div>
      <div style="font-weight:600;">{{ goal.name }}</div>
      <div style="font-size:0.75rem; color:var(--text-dim); margin-top:2px;">Valor disponível</div>
    </div>
    <div style="text-align:right;">
      <div class="mono fw-600" style="color:var(--accent);">{{ goal.current_fmt or goal.current }}</div>
    </div>
  </div>

  <div class="form-stack">
    {% if target_accounts %}
    <div class="form-group">
      <label class="form-label" for="withdrawTargetAccount">Transferir para conta</label>
      <select id="withdrawTargetAccount" name="target_account_id" class="form-select" required>
        <option value="">Selecionar conta...</option>
        {% for acc in target_accounts %}
        <option value="{{ acc.id }}">{{ acc.name }} ({{ acc.balance_fmt }})</option>
        {% endfor %}
      </select>
    </div>
    {% else %}
    <div style="padding:12px; background:var(--secondary); border-radius:8px; margin-bottom:12px;">
      <div style="color:var(--text-dim); font-size:0.875rem;">Nenhuma conta disponível.</div>
      <a href="/settings" target="_blank" style="color:var(--accent); font-size:0.875rem;">Cadastrar conta</a>
    </div>
    {% endif %}

    <div class="form-group">
      <label class="form-label" for="withdrawAmount">Valor do saque (R$)</label>
      <input type="number" id="withdrawAmount" name="amount" class="form-input mono" placeholder="0,00" step="0.01" min="0.01" max="{{ goal.current }}" required autofocus>
      <p style="font-size:0.75rem; color:var(--text-dim); margin-top:4px;">Máximo disponível: {{ goal.current_fmt or goal.current }}</p>
    </div>

    <div class="form-group">
      <label class="form-label" for="withdrawNote">Motivo (opcional)</label>
      <input type="text" id="withdrawNote" name="note" class="form-input" placeholder="Ex.: Urgência, investimento...">
    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn--outline" onclick="closeModal()">Cancelar</button>
    <button type="submit" class="btn btn--primary">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>
      </svg>
      Sacar
    </button>
  </div>
</form>
