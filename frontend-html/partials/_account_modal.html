<!-- _account_modal.html -->
<div class="modal-header">
  <span class="modal-title">{{ 'Editar Conta' if account else 'Nova Conta' }}</span>
  <button class="modal-close" onclick="closeModal()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>

<form
  method="POST"
  action="{{ '/settings/accounts/' + account.id|string + '/edit' if account else '/settings/accounts/new' }}"
  hx-post="{{ '/settings/accounts/' + account.id|string + '/edit' if account else '/settings/accounts/new' }}"
  hx-target="body"
  hx-swap="none"
  hx-on::after-request="if(event.detail.successful) { closeModal(); location.reload(); }"
  class="modal-body"
>
  <div class="form-stack">
    <div class="form-group">
      <label class="form-label" for="accName">Nome da conta</label>
      <input type="text" id="accName" name="name" class="form-input" placeholder="Ex.: Conta corrente Itaú" value="{{ account.name if account else '' }}" required>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group">
        <label class="form-label" for="accBank">Banco</label>
        <input type="text" id="accBank" name="bank" class="form-input" placeholder="Ex.: Nubank, Itaú…" value="{{ account.bank if account else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label" for="accType">Tipo</label>
        <select id="accType" name="type" class="form-select">
          <option value="checking"   {% if account and account.type == 'checking'   %}selected{% endif %}>Conta Corrente</option>
          <option value="savings"    {% if account and account.type == 'savings'    %}selected{% endif %}>Poupança</option>
          <option value="investment" {% if account and account.type == 'investment' %}selected{% endif %}>Investimento</option>
          <option value="wallet"     {% if account and account.type == 'wallet'     %}selected{% endif %}>Carteira</option>
          <option value="other"      {% if account and account.type == 'other'      %}selected{% endif %}>Outro</option>
        </select>
      </div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group">
        <label class="form-label" for="accBalance">Saldo inicial (R$)</label>
        <input type="number" id="accBalance" name="balance" class="form-input mono" placeholder="0,00" step="0.01" value="{{ account.balance if account else '0' }}">
      </div>
      <div class="form-group">
        <label class="form-label" for="accColor">Cor</label>
        <div style="display:flex; align-items:center; gap:8px;">
          <input type="color" id="accColor" name="color" value="{{ account.color if account else '#00E57A' }}" style="width:42px; height:42px; border:none; background:none; cursor:pointer; border-radius:6px;">
          <input type="text" value="{{ account.color if account else '#00E57A' }}" class="form-input mono" style="flex:1;" oninput="document.getElementById('accColor').value=this.value">
        </div>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    {% if account %}
    <button type="button" class="btn btn--danger" style="margin-right:auto;"
      onclick="confirmDelete('/settings/accounts/{{ account.id }}/delete', 'Excluir conta?')">Excluir</button>
    {% endif %}
    <button type="button" class="btn btn--outline" onclick="closeModal()">Cancelar</button>
    <button type="submit" class="btn btn--primary">{{ 'Salvar' if account else 'Criar' }}</button>
  </div>
</form>
