<!-- _card_modal.html -->
<div class="modal-header">
  <span class="modal-title">{{ 'Editar Cartão' if card else 'Novo Cartão' }}</span>
  <button class="modal-close" onclick="closeModal()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>

<form
  method="POST"
  action="{{ '/settings/cards/' + card.id|string + '/edit' if card else '/settings/cards/new' }}"
  hx-post="{{ '/settings/cards/' + card.id|string + '/edit' if card else '/settings/cards/new' }}"
  hx-target="body"
  hx-swap="none"
  hx-on::after-request="if(event.detail.successful) { closeModal(); location.reload(); }"
  class="modal-body"
>
  <div class="form-stack">
    <div class="form-group">
      <label class="form-label" for="cardName">Nome do cartão</label>
      <input type="text" id="cardName" name="name" class="form-input"
        placeholder="Ex.: Nubank Roxinho, Itaú Visa…"
        value="{{ card.name if card else '' }}" required>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group">
        <label class="form-label" for="cardType">Tipo</label>
        <select id="cardType" name="type" class="form-select">
          <option value="credit" {% if card and card.type == 'credit' %}selected{% endif %}>Crédito</option>
          <option value="debit"  {% if card and card.type == 'debit'  %}selected{% endif %}>Débito</option>
          <option value="prepaid"{% if card and card.type == 'prepaid'%}selected{% endif %}>Pré-pago</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="cardLast4">Últimos 4 dígitos</label>
        <input type="text" id="cardLast4" name="last_four" class="form-input mono"
          placeholder="0000" maxlength="4" pattern="\d{4}"
          value="{{ card.last_four if card else '' }}">
      </div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group">
        <label class="form-label" for="cardLimit">Limite (R$)</label>
        <input type="number" id="cardLimit" name="limit" class="form-input mono"
          placeholder="0,00" step="0.01" min="0"
          value="{{ card.limit if card else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label" for="cardDueDay">Dia de vencimento</label>
        <input type="number" id="cardDueDay" name="due_day" class="form-input mono"
          placeholder="1–31" min="1" max="31"
          value="{{ card.due_day if card else '' }}">
      </div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group">
        <label class="form-label" for="cardAccount">Conta vinculada</label>
        <select id="cardAccount" name="account_id" class="form-select">
          <option value="">Nenhuma</option>
          {% for acc in accounts %}
          <option value="{{ acc.id }}" {% if card and card.account_id == acc.id %}selected{% endif %}>
            {{ acc.name }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="cardCloseDay">Dia fechamento</label>
        <input type="number" id="cardCloseDay" name="close_day" class="form-input mono"
          placeholder="1–31" min="1" max="31"
          value="{{ card.close_day if card else '' }}">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Cor</label>
      <div style="display:flex; align-items:center; gap:8px;">
        <input type="color" id="cardColor" name="color"
          value="{{ card.color if card else '#3B9EFF' }}"
          style="width:42px; height:42px; border:none; background:none; cursor:pointer; border-radius:6px;">
        <input type="text" value="{{ card.color if card else '#3B9EFF' }}"
          class="form-input mono" style="flex:1;"
          oninput="document.getElementById('cardColor').value=this.value">
      </div>
    </div>
  </div>

  <div class="modal-footer">
    {% if card %}
    <button type="button" class="btn btn--danger" style="margin-right:auto;"
      onclick="confirmDelete('/settings/cards/{{ card.id }}/delete', 'Excluir cartão?')">Excluir</button>
    {% endif %}
    <button type="button" class="btn btn--outline" onclick="closeModal()">Cancelar</button>
    <button type="submit" class="btn btn--primary">{{ 'Salvar' if card else 'Criar cartão' }}</button>
  </div>
</form>
