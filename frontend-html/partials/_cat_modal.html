<!-- _cat_modal.html -->
<div class="modal-header">
  <span class="modal-title">{{ 'Editar Categoria' if cat else 'Nova Categoria' }}</span>
  <button class="modal-close" onclick="closeModal()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>

<form
  method="POST"
  action="{{ '/categories/' + cat.id|string + '/edit' if cat else '/categories/new' }}"
  hx-post="{{ '/categories/' + cat.id|string + '/edit' if cat else '/categories/new' }}"
  hx-target="body"
  hx-swap="none"
  hx-on::after-request="if(event.detail.successful) { closeModal(); location.reload(); }"
  class="modal-body"
>
  <div class="form-stack">
    <!-- Type -->
    <div class="form-group">
      <label class="form-label">Tipo</label>
      <div class="tab-list">
        <button type="button" class="tab-btn {{ 'active' if not cat or cat.type == 'expense' }}" onclick="setCatType('expense',this)">Despesa</button>
        <button type="button" class="tab-btn {{ 'active' if cat and cat.type == 'income' }}"    onclick="setCatType('income', this)">Receita</button>
      </div>
      <input type="hidden" name="type" id="catTypeInput" value="{{ cat.type if cat else 'expense' }}">
    </div>

    <!-- Name -->
    <div class="form-group">
      <label class="form-label" for="catName">Nome</label>
      <input type="text" id="catName" name="name" class="form-input" placeholder="Ex.: Alimentação, Salário…" value="{{ cat.name if cat else '' }}" required>
    </div>

    <!-- Icon + Color -->
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group">
        <label class="form-label" for="catIcon">Ícone (emoji)</label>
        <input type="text" id="catIcon" name="icon" class="form-input" placeholder="🍕" value="{{ cat.icon if cat else '' }}" maxlength="4">
      </div>
      <div class="form-group">
        <label class="form-label" for="catColor">Cor</label>
        <div style="display:flex; align-items:center; gap:8px;">
          <input type="color" id="catColor" name="color" value="{{ cat.color if cat else '#00E57A' }}" style="width:42px; height:42px; border:none; background:none; cursor:pointer; border-radius:6px;">
          <input type="text" name="color_hex" value="{{ cat.color if cat else '#00E57A' }}" class="form-input mono" placeholder="#00E57A" style="flex:1;" oninput="document.getElementById('catColor').value=this.value">
        </div>
      </div>
    </div>

    <!-- Budget (expense only) -->
    <div class="form-group" id="catBudgetWrap">
      <label class="form-label" for="catBudget">Limite mensal (R$) — opcional</label>
      <input type="number" id="catBudget" name="budget" class="form-input mono" placeholder="0,00" step="0.01" min="0" value="{{ cat.budget if cat and cat.budget else '' }}">
    </div>
  </div>

  <div class="modal-footer">
    {% if cat %}
    <button
      type="button"
      class="btn btn--danger"
      style="margin-right:auto;"
      onclick="confirmDelete('/categories/{{ cat.id }}/delete', 'Excluir categoria?')"
    >Excluir</button>
    {% endif %}
    <button type="button" class="btn btn--outline" onclick="closeModal()">Cancelar</button>
    <button type="submit" class="btn btn--primary">{{ 'Salvar' if cat else 'Criar' }}</button>
  </div>
</form>

<script>
function setCatType(type, btn) {
  document.getElementById('catTypeInput').value = type;
  btn.closest('.tab-list').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('catBudgetWrap').style.display = type === 'expense' ? '' : 'none';
}
</script>
