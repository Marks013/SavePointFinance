<!-- _inst_modal.html -->
<div class="modal-header">
  <span class="modal-title">{{ 'Editar Parcelamento' if inst else 'Novo Parcelamento' }}</span>
  <button class="modal-close" onclick="closeModal()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>

<form
  method="POST"
  action="{{ '/installments/' + inst.id + '/edit' if inst else '/installments/new' }}"
  hx-post="{{ '/installments/' + inst.id + '/edit' if inst else '/installments/new' }}"
  hx-target="body"
  hx-swap="none"
  hx-on::after-request="if(event.detail.successful) { closeModal(); location.reload(); }"
  class="modal-body"
>
  <div class="form-stack">
    <div class="form-group">
      <label class="form-label" for="instDesc">Descrição</label>
      <input type="text" id="instDesc" name="description" class="form-input" placeholder="Ex.: Televisão 50 polegadas" value="{{ inst.description if inst else '' }}" required>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group">
        <label class="form-label" for="instAmount">Valor Total (R$)</label>
        <input type="number" id="instAmount" name="amount" class="form-input mono" placeholder="0,00" step="0.01" min="0.01" value="{{ inst.total_amount if inst else '' }}" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="instQty">Parcelas</label>
        <input type="number" id="instQty" name="installments" class="form-input mono" placeholder="12" min="2" max="120" value="{{ inst.total_installments if inst else '12' }}" required>
      </div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group">
        <label class="form-label" for="instDate">Primeira parcela</label>
        <input type="date" id="instDate" name="start_date" class="form-input" value="{{ inst.first_date if inst else today }}" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="instCard">Cartão</label>
        {% if cards %}
        <select id="instCard" name="card_id" class="form-select" required>
          <option value="">Selecionar cartão</option>
          {% for card in cards %}
          <option value="{{ card.id }}" {% if inst and inst.card_id == card.id %}selected{% endif %}>{{ card.name }}</option>
          {% endfor %}
        </select>
        {% else %}
        <div style="padding:8px 12px; background:var(--secondary); border-radius:6px; font-size:0.875rem;">
          Nenhum cartão. <a href="/accounts" target="_blank" style="color:var(--accent);">Cadastrar</a>
        </div>
        {% endif %}
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="instCat">Categoria</label>
      <select id="instCat" name="category_id" class="form-select">
        <option value="">Sem categoria</option>
        {% for cat in categories %}
        <option value="{{ cat.id }}" {% if inst and inst.category_id == cat.id %}selected{% endif %}>{{ cat.icon | icon | safe if cat.icon else '' }} {{ cat.name }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <div class="modal-footer">
    {% if inst %}
    <button type="button" class="btn btn--danger" style="margin-right:auto;"
      onclick="confirmDelete('/installments/{{ inst.id }}/delete', 'Excluir parcelamento?')">Excluir</button>
    {% endif %}
    <button type="button" class="btn btn--outline" onclick="closeModal()">Cancelar</button>
    <button type="submit" class="btn btn--primary">{{ 'Salvar' if inst else 'Criar' }}</button>
  </div>
</form>

<script>
// Calculate and show installment preview
document.getElementById('instAmount')?.addEventListener('input', updatePreview);
document.getElementById('instQty')?.addEventListener('input', updatePreview);

function updatePreview() {
  const amount = parseFloat(document.getElementById('instAmount')?.value) || 0;
  const qty = parseInt(document.getElementById('instQty')?.value) || 1;
  if (qty > 0) {
    const perInstallment = amount / qty;
    console.log(`Each installment: R$ ${perInstallment.toFixed(2)}`);
  }
}
</script>
