<!-- _goal_deposit_modal.html -->
<div class="modal-header">
  <span class="modal-title">Depositar na Meta</span>
  <button class="modal-close" onclick="closeModal()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>

<form
  method="POST"
  action="/goals/{{ goal.id }}/deposit"
  hx-post="/goals/{{ goal.id }}/deposit"
  hx-target="body"
  hx-swap="none"
  class="modal-body"
>
  <!-- Goal info -->
  <div style="background:var(--secondary); border-radius:10px; padding:16px; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between;">
    <div>
      <div style="font-weight:600;">{{ goal.name }}</div>
      <div style="font-size:0.75rem; color:var(--text-dim); margin-top:2px;">Progresso atual</div>
    </div>
    <div style="text-align:right;">
      <div class="mono fw-600" style="color:var(--accent);">{{ goal.current_fmt or goal.current }}</div>
      <div style="font-size:0.75rem; color:var(--text-dim);">de {{ goal.target_fmt or goal.target }}</div>
    </div>
  </div>

  {% set pct = [(goal.current / goal.target * 100), 100]|min if goal.target else 0 %}
  <div class="progress-track" style="margin-bottom:20px;">
    <div class="progress-bar" style="width:{{ pct }}%; background:{{ goal.color or '#00E57A' }};"></div>
  </div>

  <div class="form-stack">
    <div class="form-group">
      <label class="form-label" for="depositAmount">Valor do depósito (R$)</label>
      <input type="number" id="depositAmount" name="amount" class="form-input mono" placeholder="0,00" step="0.01" min="0.01" required autofocus>
    </div>

    <div class="form-group">
      <label class="form-label" for="depositNote">Nota (opcional)</label>
      <input type="text" id="depositNote" name="note" class="form-input" placeholder="Ex.: Salário de março">
    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn--outline" onclick="closeModal()">Cancelar</button>
    <button type="submit" class="btn btn--primary">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
      </svg>
      Depositar
    </button>
  </div>
</form>
