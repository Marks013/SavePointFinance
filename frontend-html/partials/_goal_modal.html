<!-- _goal_modal.html -->
<div class="modal-header">
  <span class="modal-title">{{ 'Editar Meta' if goal else 'Nova Meta' }}</span>
  <button class="modal-close" onclick="closeModal()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>

<form
  method="POST"
  action="{{ '/goals/' + goal.id|string + '/edit' if goal else '/goals/new' }}"
  hx-post="{{ '/goals/' + goal.id|string + '/edit' if goal else '/goals/new' }}"
  hx-target="body"
  hx-swap="none"
  hx-on::after-request="if(event.detail.successful) { closeModal(); location.reload(); }"
  class="modal-body"
>
  <div class="form-stack">
    <div class="form-group">
      <label class="form-label" for="goalName">Nome da meta</label>
      <input type="text" id="goalName" name="name" class="form-input" placeholder="Ex.: Fundo de emergência" value="{{ goal.name if goal else '' }}" required>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group">
        <label class="form-label" for="goalTarget">Valor alvo (R$)</label>
        <input type="number" id="goalTarget" name="target_amount" class="form-input mono" placeholder="0,00" step="0.01" min="1" value="{{ goal.target_amount if goal else '' }}" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="goalCurrent">Valor atual (R$)</label>
        <input type="number" id="goalCurrent" name="current_amount" class="form-input mono" placeholder="0,00" step="0.01" min="0" value="{{ goal.current_amount if goal else '0' }}">
      </div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group">
        <label class="form-label" for="goalDeadline">Prazo</label>
        <input type="date" id="goalDeadline" name="deadline" class="form-input" value="{{ goal.deadline.strftime('%Y-%m-%d') if goal and goal.deadline else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label" for="goalColor">Cor</label>
        <div style="display:flex; align-items:center; gap:8px;">
          <input type="color" id="goalColor" name="color" value="{{ goal.color if goal else '#00E57A' }}" style="width:42px; height:42px; border:none; background:none; cursor:pointer; border-radius:6px;">
          <input type="text" value="{{ goal.color if goal else '#00E57A' }}" class="form-input mono" style="flex:1;" oninput="document.getElementById('goalColor').value=this.value">
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="goalAccount">Conta para acumular</label>
      {% if accounts %}
      <select id="goalAccount" name="account_id" class="form-select">
        <option value="">Nenhuma (apenas registro)</option>
        {% for acc in accounts %}
        <option value="{{ acc.id }}" {% if goal and goal.account_id == acc.id %}selected{% endif %}>{{ acc.name }} ({{ acc.balance_fmt }})</option>
        {% endfor %}
      </select>
      <p style="font-size:0.75rem; color:var(--text-dim); margin-top:4px;">O dinheiro será transferido para esta conta ao depositar</p>
      {% else %}
      <div style="padding:8px 12px; background:var(--secondary); border-radius:6px; font-size:0.875rem;">
        Nenhuma conta. <a href="/settings" target="_blank" style="color:var(--accent);">Cadastrar</a>
      </div>
      {% endif %}
    </div>

    {% if goal %}
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:12px; background:var(--secondary); border-radius:8px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <input type="checkbox" id="goalNotifyComplete" name="notify_on_complete" value="1" {% if goal.notify_on_complete %}checked{% endif %} style="width:16px; height:16px;">
        <label for="goalNotifyComplete" style="font-size:0.875rem;">Notificar ao completar</label>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <input type="checkbox" id="goalNotifyDeadline" name="notify_on_deadline" value="1" {% if goal.notify_on_deadline %}checked{% endif %} style="width:16px; height:16px;">
        <label for="goalNotifyDeadline" style="font-size:0.875rem;">Notificar perto do prazo</label>
      </div>
    </div>
    {% endif %}
  </div>

  <div class="modal-footer">
    {% if goal %}
    <button type="button" class="btn btn--danger" style="margin-right:auto;"
      onclick="confirmDelete('/goals/{{ goal.id }}/delete', 'Excluir meta?')">Excluir</button>
    {% endif %}
    <button type="button" class="btn btn--outline" onclick="closeModal()">Cancelar</button>
    <button type="submit" class="btn btn--primary">{{ 'Salvar' if goal else 'Criar meta' }}</button>
  </div>
</form>
