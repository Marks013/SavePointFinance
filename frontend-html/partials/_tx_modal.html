<!-- _tx_modal.html: Create / Edit transaction modal -->
<!-- BUG FIX: O form anterior usava hx-target="#tx-table-wrap" mas o servidor retorna o HTML do
     modal (com success:True), não o HTML da tabela. Isso injetava o modal dentro da tabela,
     quebrando completamente o layout. Corrigido para recarregar a página após sucesso. -->
{% if success %}
<script>
  closeModal();
  window.dispatchEvent(new Event('sp:refreshData'));
</script>
{% else %}
<div class="modal-header">
  <span class="modal-title">{{ 'Editar Transação' if tx else 'Nova Transação' }}</span>
  <button class="modal-close" onclick="closeModal()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>

<form
  method="POST"
  action="{{ '/transactions/' + tx.id|string + '/edit' if tx else '/transactions/new' }}"
  hx-post="{{ '/transactions/' + tx.id|string + '/edit' if tx else '/transactions/new' }}"
  hx-target="#modal-content"
  hx-swap="innerHTML"

  class="modal-body"
>
  <div class="form-stack">
    <!-- Type toggle -->
    <div class="form-group">
      <label class="form-label">Tipo</label>
      <div class="tab-list">
        <button type="button" class="tab-btn {{ 'active' if not tx or tx.type == 'expense' }}" onclick="setTxType('expense', this)">Despesa</button>
        <button type="button" class="tab-btn {{ 'active' if tx and tx.type == 'income' }}"   onclick="setTxType('income',  this)">Receita</button>
      </div>
      <input type="hidden" name="type" id="txTypeInput" value="{{ tx.type if tx else 'expense' }}">
    </div>

    <!-- Description -->
    <div class="form-group">
      <label class="form-label" for="txDesc">Descrição</label>
      <input type="text" id="txDesc" name="description" class="form-input" placeholder="Ex.: Aluguel, Salário…" value="{{ tx.description if tx else '' }}" required>
    </div>

    <!-- Amount + Date -->
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group">
        <label class="form-label" for="txAmount">Valor (R$)</label>
        <input type="number" id="txAmount" name="amount" class="form-input mono" placeholder="0,00" step="0.01" min="0.01" value="{{ tx.amount if tx else '' }}" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="txDate">Data</label>
        <input type="date" id="txDate" name="date" class="form-input" value="{{ tx.date.strftime('%Y-%m-%d') if tx and tx.date else today }}" required>
      </div>
    </div>

    <!-- Category -->
    <div class="form-group">
      <label class="form-label" for="txCat">Categoria</label>
      <select id="txCat" name="category_id" class="form-select">
        <option value="">Sem categoria</option>
        {% for cat in categories %}
          <option value="{{ cat.id }}" {% if tx and tx.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Account / Card (payment method) -->
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group">
        <label class="form-label" for="txSource">Método de pagamento</label>
        <select id="txSource" name="source" class="form-select" onchange="toggleAccountCard(this.value)">
          <option value="">Selecione...</option>
          <option value="pix"           {% if tx and tx.payment_method == 'pix'           %}selected{% endif %}>PIX</option>
          <option value="bank"          {% if tx and tx.payment_method == 'transfer'       %}selected{% endif %}>Transferência</option>
          <option value="credit_card"   {% if tx and tx.payment_method == 'credit_card'   %}selected{% endif %}>Cartão de Crédito</option>
          <option value="debit_card"    {% if tx and tx.payment_method == 'debit_card'    %}selected{% endif %}>Cartão de Débito</option>
          <option value="cash"          {% if tx and tx.payment_method == 'money'         %}selected{% endif %}>Dinheiro</option>
          <option value="other"         selected>Outro</option>
        </select>
      </div>

      <div class="form-group" id="accountWrap">
        <label class="form-label" for="txAccount">Conta</label>
        {% if accounts %}
        <select id="txAccount" name="account_id" class="form-select">
          <option value="">Selecionar conta</option>
          {% for acc in accounts %}
          <option value="{{ acc.id }}" {% if tx and tx.account_id == acc.id %}selected{% endif %}>{{ acc.name }}</option>
          {% endfor %}
        </select>
        {% else %}
        <div style="padding:8px 12px; background:var(--secondary); border-radius:6px; font-size:0.875rem;">
          Nenhuma conta. <a href="/settings" target="_blank" style="color:var(--accent);">Cadastrar</a>
        </div>
        {% endif %}
      </div>

      <div class="form-group" id="cardWrap" style="display:none;">
        <label class="form-label" for="txCard">Cartão</label>
        {% if cards %}
        <select id="txCard" name="card_id" class="form-select">
          <option value="">Selecionar cartão</option>
          {% for card in cards %}
          <option value="{{ card.id }}" {% if tx and tx.card_id == card.id %}selected{% endif %}>{{ card.name }}</option>
          {% endfor %}
        </select>
        {% else %}
        <div style="padding:8px 12px; background:var(--secondary); border-radius:6px; font-size:0.875rem;">
          Nenhum cartão. <a href="/settings" target="_blank" style="color:var(--accent);">Cadastrar</a>
        </div>
        {% endif %}
      </div>
    </div>

    <!-- Notes -->
    <div class="form-group">
      <label class="form-label" for="txNotes">Observações (opcional)</label>
      <textarea id="txNotes" name="notes" class="form-textarea" rows="2" placeholder="Detalhes adicionais…">{{ tx.notes if tx else '' }}</textarea>
    </div>

    <!-- BUG FIX: Tithe checkbox agora é visível estritamente para tipos Income -->
    <div id="titheWrap" {% if (tx and tx.type != 'income') or (not tx and tx_type != 'income') %}style="display: none;"{% endif %}>
      <div style="display:flex; align-items:center; gap:10px; padding:10px; background:var(--secondary); border-radius:8px;">
        <input type="checkbox" id="txTithe" name="tithe" value="1"
          {% if not tx or (tx_type or tx.type) == 'income' %}checked{% endif %}
          style="accent-color:var(--accent); width:16px; height:16px; cursor:pointer;">
        <label for="txTithe" style="font-size:0.875rem; cursor:pointer;">Criar dízimo (10% desta receita)</label>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn--outline" onclick="closeModal()">Cancelar</button>
    <button type="submit" class="btn btn--primary">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
      </svg>
      {{ 'Salvar alterações' if tx else 'Criar transação' }}
    </button>
  </div>
</form>
{% endif %}

<script>
function setTxType(type, btn) {
  document.getElementById('txTypeInput').value = type;
  btn.closest('.tab-list').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // BUG FIX: controle do tithe via JS em vez de server-side
  const titheDiv = document.getElementById('titheWrap');
  if (titheDiv) {
    titheDiv.style.display = type === 'income' ? '' : 'none';
  }
}

function toggleAccountCard(source) {
  const accountWrap = document.getElementById('accountWrap');
  const cardWrap = document.getElementById('cardWrap');
  const accountSelect = document.getElementById('txAccount');
  const cardSelect = document.getElementById('txCard');

  const needsCard = source === 'credit_card' || source === 'debit_card';

  if (needsCard) {
    accountWrap.style.display = 'none';
    cardWrap.style.display = '';
    if (accountSelect) accountSelect.removeAttribute('required');
    if (cardSelect) cardSelect.setAttribute('required', 'required');
  } else if (source && source !== 'cash' && source !== 'other' && source !== '') {
    accountWrap.style.display = '';
    cardWrap.style.display = 'none';
    if (accountSelect) accountSelect.setAttribute('required', 'required');
    if (cardSelect) cardSelect.removeAttribute('required');
  } else {
    accountWrap.style.display = '';
    cardWrap.style.display = 'none';
    if (accountSelect) accountSelect.removeAttribute('required');
    if (cardSelect) cardSelect.removeAttribute('required');
  }
}

// Init based on existing value
document.addEventListener('DOMContentLoaded', function() {
  const sourceSelect = document.getElementById('txSource');
  if (sourceSelect && sourceSelect.value) {
    toggleAccountCard(sourceSelect.value);
  }
});
</script>
