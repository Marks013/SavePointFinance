<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metas & Sonhos — Save Point Finanças</title>
  <meta name="description" content="Defina seus sonhos e acompanhe o progresso de cada meta financeira associada às suas contas bancárias.">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ── Page-specific enhancement styles ────────────────────────────────── */

    .goals-hero {
      background: linear-gradient(135deg, #0F2027 0%, #0D1B2A 50%, #001a0a 100%);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(0, 229, 122, 0.12);
    }
    .goals-hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(0,229,122,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    .goals-hero-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .goals-hero-sub {
      color: var(--text-3);
      font-size: 0.95rem;
      margin-bottom: 24px;
    }
    .goals-hero-stats {
      display: flex;
      gap: 32px;
    }
    .goals-hero-stat {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .goals-hero-stat-val {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--em);
    }
    .goals-hero-stat-label {
      font-size: 0.8rem;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Goal Cards ───────────────────────────────────────────────────────── */
    .goals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 28px;
    }
    .goal-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      cursor: pointer;
    }
    .goal-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--goal-color, var(--em));
      border-radius: 16px 16px 0 0;
    }
    .goal-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      border-color: var(--goal-color, var(--em));
    }
    .goal-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .goal-icon-wrap {
      width: 52px; height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      background: var(--goal-color, var(--em));
      opacity: 0.9;
    }
    .goal-actions {
      display: flex;
      gap: 6px;
    }
    .goal-action-btn {
      width: 30px; height: 30px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      transition: all 0.15s;
    }
    .goal-action-btn:hover {
      background: var(--bg-3);
      color: var(--text);
    }
    .goal-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .goal-account-tag {
      font-size: 0.8rem;
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
    }
    .goal-amounts {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .goal-current {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
    }
    .goal-target {
      font-size: 0.9rem;
      color: var(--text-3);
    }
    .goal-bar-track {
      height: 8px;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .goal-bar-fill {
      height: 100%;
      border-radius: 8px;
      background: var(--goal-color, var(--em));
      transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
    }
    .goal-bar-fill::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 8px var(--goal-color, var(--em));
    }
    .goal-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
    }
    .goal-percent {
      font-weight: 600;
      color: var(--goal-color, var(--em));
    }
    .goal-deadline {
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .goal-deadline.urgent {
      color: var(--amber);
    }
    .goal-deadline.danger {
      color: var(--red);
    }

    /* ── Completed Stamp ──────────────────────────────────────────────────── */
    .goal-card.completed {
      opacity: 0.75;
    }
    .goal-card.completed .goal-bar-fill {
      background: var(--em) !important;
    }
    .goal-complete-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(0,229,122,0.12);
      border: 1px solid rgba(0,229,122,0.3);
      color: var(--em);
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    /* ── Empty State ──────────────────────────────────────────────────────── */
    .goals-empty {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-3);
    }
    .goals-empty-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      display: block;
    }
    .goals-empty h3 {
      font-size: 1.2rem;
      color: var(--text-2);
      margin-bottom: 8px;
    }

    /* ── Modal Enhancements ───────────────────────────────────────────────── */
    .icon-picker {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 8px;
      max-height: 140px;
      overflow-y: auto;
    }
    .icon-option {
      width: 40px; height: 40px;
      border-radius: 10px;
      border: 2px solid transparent;
      background: var(--bg-3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: all 0.15s;
    }
    .icon-option:hover {
      border-color: var(--em);
      background: rgba(0,229,122,0.1);
    }
    .icon-option.selected {
      border-color: var(--em);
      background: rgba(0,229,122,0.15);
      box-shadow: 0 0 0 3px rgba(0,229,122,0.1);
    }
    .color-picker-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .color-option {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .color-option:hover { transform: scale(1.15); }
    .color-option.selected {
      border-color: white;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
    }

    /* ── Deposit Modal ─────────────────────────────────────────────────────── */
    .deposit-card-preview {
      background: var(--bg-3);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    @keyframes goalAppear {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .goal-card { animation: goalAppear 0.4s ease both; }
    .goal-card:nth-child(1) { animation-delay: 0.05s; }
    .goal-card:nth-child(2) { animation-delay: 0.10s; }
    .goal-card:nth-child(3) { animation-delay: 0.15s; }
    .goal-card:nth-child(4) { animation-delay: 0.20s; }
    .goal-card:nth-child(5) { animation-delay: 0.25s; }
    .goal-card:nth-child(6) { animation-delay: 0.30s; }
  </style>
</head>
<body>

<div class="app-shell">
  <div id="sidebar-mount"></div>

  <div class="main-content">
    <div class="page-header">
      <div class="page-title">🎯 Metas & Sonhos</div>
      <div class="page-actions">
        <button class="btn btn--primary" id="btn-new-goal">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nova Meta
        </button>
      </div>
    </div>

    <div class="page-body">
      <!-- Hero Summary -->
      <div class="goals-hero" id="goals-hero" style="display:none">
        <div class="goals-hero-title">
          <span>✨</span> Seu progresso financeiro
        </div>
        <div class="goals-hero-sub">Acompanhe cada sonho e veja quanto falta para realizá-lo.</div>
        <div class="goals-hero-stats">
          <div class="goals-hero-stat">
            <div class="goals-hero-stat-val" id="hero-total-goals">—</div>
            <div class="goals-hero-stat-label">Metas ativas</div>
          </div>
          <div class="goals-hero-stat">
            <div class="goals-hero-stat-val" id="hero-saved">—</div>
            <div class="goals-hero-stat-label">Total guardado</div>
          </div>
          <div class="goals-hero-stat">
            <div class="goals-hero-stat-val" id="hero-needed">—</div>
            <div class="goals-hero-stat-label">Ainda faltam</div>
          </div>
          <div class="goals-hero-stat">
            <div class="goals-hero-stat-val" id="hero-completed">—</div>
            <div class="goals-hero-stat-label">Concluídas 🏆</div>
          </div>
        </div>
      </div>

      <!-- Goals Grid -->
      <div class="goals-grid" id="goals-grid">
        <div style="grid-column:1/-1;padding:80px 0;text-align:center;color:var(--text-3)">
          <span style="font-size:2rem">⏳</span><br>Carregando...
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══ Create/Edit Modal ════════════════════════════════════════════════════ -->
<div class="modal" id="goal-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">Nova Meta</h3>
      <button class="btn btn--ghost btn--icon" data-close-modal id="close-goal-modal">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="goal-id">

      <div class="form-group">
        <label class="form-label">Nome da Meta *</label>
        <input type="text" class="form-control" id="goal-name" placeholder="Ex: Viagem para Europa 🇪🇺, Carro novo 🚗..." maxlength="100">
      </div>

      <div class="form-group">
        <label class="form-label">Ícone / Emoji</label>
        <div class="icon-picker" id="icon-picker">
          <!-- JS populated -->
        </div>
        <input type="hidden" id="goal-icon" value="🎯">
      </div>

      <div class="form-group">
        <label class="form-label">Cor do card</label>
        <div class="color-picker-row" id="color-picker">
          <!-- JS populated -->
        </div>
        <input type="hidden" id="goal-color" value="#10B981">
      </div>

      <div class="form-row" style="gap:16px">
        <div class="form-group">
          <label class="form-label">Valor alvo (R$) *</label>
          <input type="number" class="form-control" id="goal-target" min="0.01" step="0.01" placeholder="0,00">
        </div>
        <div class="form-group">
          <label class="form-label">Já guardei (R$)</label>
          <input type="number" class="form-control" id="goal-current" min="0" step="0.01" placeholder="0,00" value="0">
        </div>
      </div>

      <div class="form-row" style="gap:16px">
        <div class="form-group">
          <label class="form-label">Conta associada</label>
          <select class="form-control" id="goal-account">
            <option value="">Nenhuma (cofre virtual)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Prazo (opcional)</label>
          <input type="date" class="form-control" id="goal-deadline">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn--ghost" data-close-modal>Cancelar</button>
      <button class="btn btn--primary" id="btn-save-goal">Salvar Meta</button>
    </div>
  </div>
</div>

<!-- ══ Deposit Modal ════════════════════════════════════════════════════════ -->
<div class="modal" id="deposit-modal">
  <div class="modal-box" style="max-width:420px">
    <div class="modal-header">
      <h3>💰 Atualizar Valor Guardado</h3>
      <button class="btn btn--ghost btn--icon" data-close-modal id="close-deposit-modal">✕</button>
    </div>
    <div class="modal-body">
      <div class="deposit-card-preview" id="deposit-preview">
        <!-- populated by JS -->
      </div>
      <div class="form-group">
        <label class="form-label">Novo total guardado (R$)</label>
        <input type="number" class="form-control" id="deposit-amount" min="0" step="0.01" style="font-size:1.4rem;text-align:center">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn--ghost" data-close-modal>Cancelar</button>
      <button class="btn btn--primary" id="btn-save-deposit">Salvar</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuthAndRender } from './js/nav.js';
  import { goalsApi, accountsApi } from './js/api.js';
  import { formatBRL, formatDate, toast, openModal, closeModal, setupModalClose, confirm } from './js/utils.js';

  if (!requireAuthAndRender('goals.html')) throw new Error('not auth');

  const ICONS = ['🎯','🏠','🚗','✈️','🎓','💻','📱','💍','🏖️','🛍️','🎸','🏋️','🏊','⛵','🏕️','🎨','📷','🎮','🍕','☕','🐕','🌱','🔑','🛒','💎','🏆','🌍','🚀','💪','🎁','🏦','📚','🎬','🎵','🏡','🚴','🧘','🌈','🎂','🎉'];
  const COLORS = ['#10B981','#3B82F6','#8B5CF6','#F59E0B','#EF4444','#EC4899','#06B6D4','#84CC16','#F97316','#6366F1','#14B8A6','#A855F7','#FBBF24','#22C55E','#64748B'];

  let goals = [];
  let accounts = [];
  let editingGoalId = null;
  let depositGoalId = null;

  // ── Build Icon Picker ──────────────────────────────────────────────────────
  const iconPicker = document.getElementById('icon-picker');
  ICONS.forEach(em => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'icon-option';
    btn.textContent = em;
    btn.onclick = () => {
      document.querySelectorAll('.icon-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('goal-icon').value = em;
    };
    iconPicker.appendChild(btn);
  });

  // ── Build Color Picker ─────────────────────────────────────────────────────
  const colorPickerEl = document.getElementById('color-picker');
  COLORS.forEach(c => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'color-option';
    btn.style.background = c;
    btn.dataset.color = c;
    btn.onclick = () => {
      document.querySelectorAll('.color-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('goal-color').value = c;
    };
    colorPickerEl.appendChild(btn);
  });

  // ── Load Accounts ──────────────────────────────────────────────────────────
  async function loadAccounts() {
    try {
      accounts = await accountsApi.list();
      const sel = document.getElementById('goal-account');
      accounts.forEach(a => {
        const opt = document.createElement('option');
        opt.value = a.id;
        opt.textContent = `${a.name} (${formatBRL(a.balance)})`;
        sel.appendChild(opt);
      });
    } catch {}
  }

  // ── Render Goals ───────────────────────────────────────────────────────────
  function daysUntil(dateStr) {
    if (!dateStr) return null;
    const diff = new Date(dateStr + 'T00:00:00') - new Date();
    return Math.ceil(diff / (1000 * 60 * 60 * 24));
  }

  function deadlineLabel(dateStr) {
    if (!dateStr) return '';
    const days = daysUntil(dateStr);
    if (days < 0) return `<span class="goal-deadline danger">⚠️ Vencida</span>`;
    if (days <= 30) return `<span class="goal-deadline urgent">🔥 ${days}d restantes</span>`;
    if (days <= 90) return `<span class="goal-deadline urgent">⏳ ${days}d</span>`;
    return `<span class="goal-deadline">📅 ${formatDate(dateStr)}</span>`;
  }

  function renderGoals() {
    const grid = document.getElementById('goals-grid');
    if (!goals.length) {
      grid.innerHTML = `
        <div class="goals-empty" style="grid-column:1/-1">
          <span class="goals-empty-icon">🌟</span>
          <h3>Nenhuma meta ainda</h3>
          <p>Comece definindo seu primeiro sonho. Cada grande conquista começa com um primeiro passo!</p>
          <button class="btn btn--primary" style="margin-top:20px" id="empty-new-goal">+ Criar minha primeira meta</button>
        </div>`;
      document.getElementById('empty-new-goal')?.addEventListener('click', openNewGoal);
      document.getElementById('goals-hero').style.display = 'none';
      return;
    }

    // Hero stats
    const completed = goals.filter(g => parseFloat(g.current_amount) >= parseFloat(g.target_amount));
    const totalSaved = goals.reduce((s, g) => s + parseFloat(g.current_amount), 0);
    const totalNeeded = goals.reduce((s, g) => s + Math.max(0, parseFloat(g.target_amount) - parseFloat(g.current_amount)), 0);
    document.getElementById('hero-total-goals').textContent = goals.length - completed.length;
    document.getElementById('hero-saved').textContent = formatBRL(totalSaved);
    document.getElementById('hero-needed').textContent = formatBRL(totalNeeded);
    document.getElementById('hero-completed').textContent = completed.length;
    document.getElementById('goals-hero').style.display = 'block';

    grid.innerHTML = goals.map(g => {
      const curr = parseFloat(g.current_amount);
      const target = parseFloat(g.target_amount);
      const perc = target > 0 ? Math.min(100, Math.round((curr / target) * 100)) : 0;
      const isDone = curr >= target;
      const acct = accounts.find(a => a.id === g.account_id);
      const icon = g.icon || '🎯';
      const color = g.color || '#10B981';

      return `<div class="goal-card${isDone ? ' completed' : ''}" style="--goal-color:${color}">
        <div class="goal-card-header">
          <div class="goal-icon-wrap" style="background:${color}28;font-size:1.6rem">${icon}</div>
          <div class="goal-actions">
            ${!isDone ? `<button class="goal-action-btn" title="Atualizar valor" onclick="openDeposit('${g.id}')">💰</button>` : ''}
            <button class="goal-action-btn" title="Editar" onclick="openEdit('${g.id}')">✏️</button>
            <button class="goal-action-btn" title="Excluir" onclick="deleteGoal('${g.id}')">🗑️</button>
          </div>
        </div>
        <div class="goal-name">${g.name}</div>
        <div class="goal-account-tag">
          🏦 ${acct ? acct.name : 'Cofre virtual'}
          ${isDone ? '<span class="goal-complete-badge">✅ Concluída!</span>' : ''}
        </div>
        <div class="goal-amounts">
          <div class="goal-current">${formatBRL(curr)}</div>
          <div class="goal-target">de ${formatBRL(target)}</div>
        </div>
        <div class="goal-bar-track">
          <div class="goal-bar-fill" style="width:${perc}%;background:${isDone ? '#10B981' : color}"></div>
        </div>
        <div class="goal-footer">
          <span class="goal-percent">${perc}% completo</span>
          ${deadlineLabel(g.deadline)}
        </div>
      </div>`;
    }).join('');
  }

  // ── Load Goals ─────────────────────────────────────────────────────────────
  async function loadGoals() {
    try {
      goals = await goalsApi.list();
      renderGoals();
    } catch {
      document.getElementById('goals-grid').innerHTML =
        `<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--red)">Erro ao carregar metas.</div>`;
    }
  }

  // ── Open New Goal ──────────────────────────────────────────────────────────
  function openNewGoal() {
    editingGoalId = null;
    document.getElementById('modal-title').textContent = '🎯 Nova Meta';
    document.getElementById('goal-id').value = '';
    document.getElementById('goal-name').value = '';
    document.getElementById('goal-target').value = '';
    document.getElementById('goal-current').value = '0';
    document.getElementById('goal-account').value = '';
    document.getElementById('goal-deadline').value = '';

    // Default icon + color
    const defaultIcon = '🎯';
    const defaultColor = '#10B981';
    document.getElementById('goal-icon').value = defaultIcon;
    document.getElementById('goal-color').value = defaultColor;
    document.querySelectorAll('.icon-option').forEach(b => b.classList.toggle('selected', b.textContent === defaultIcon));
    document.querySelectorAll('.color-option').forEach(b => b.classList.toggle('selected', b.dataset.color === defaultColor));

    openModal('goal-modal');
    document.getElementById('goal-name').focus();
  }

  // ── Open Edit ─────────────────────────────────────────────────────────────
  window.openEdit = function(id) {
    const g = goals.find(x => x.id === id);
    if (!g) return;
    editingGoalId = id;
    document.getElementById('modal-title').textContent = '✏️ Editar Meta';
    document.getElementById('goal-id').value = g.id;
    document.getElementById('goal-name').value = g.name;
    document.getElementById('goal-target').value = g.target_amount;
    document.getElementById('goal-current').value = g.current_amount;
    document.getElementById('goal-account').value = g.account_id || '';
    document.getElementById('goal-deadline').value = g.deadline || '';

    const icon = g.icon || '🎯';
    const color = g.color || '#10B981';
    document.getElementById('goal-icon').value = icon;
    document.getElementById('goal-color').value = color;
    document.querySelectorAll('.icon-option').forEach(b => b.classList.toggle('selected', b.textContent === icon));
    document.querySelectorAll('.color-option').forEach(b => b.classList.toggle('selected', b.dataset.color === color));

    openModal('goal-modal');
  };

  // ── Open Deposit ───────────────────────────────────────────────────────────
  window.openDeposit = function(id) {
    const g = goals.find(x => x.id === id);
    if (!g) return;
    depositGoalId = id;
    const acct = accounts.find(a => a.id === g.account_id);
    document.getElementById('deposit-preview').innerHTML = `
      <div style="font-size:2rem">${g.icon || '🎯'}</div>
      <div>
        <div style="font-weight:600;color:var(--text)">${g.name}</div>
        <div style="font-size:0.85rem;color:var(--text-3)">🏦 ${acct ? acct.name : 'Cofre virtual'} · Meta: ${formatBRL(g.target_amount)}</div>
      </div>`;
    document.getElementById('deposit-amount').value = g.current_amount;
    openModal('deposit-modal');
    document.getElementById('deposit-amount').focus();
    document.getElementById('deposit-amount').select();
  };

  // ── Delete ─────────────────────────────────────────────────────────────────
  window.deleteGoal = async function(id) {
    const g = goals.find(x => x.id === id);
    if (!g) return;
    const ok = await confirm(`Excluir a meta "${g.name}"? Esta ação não pode ser desfeita.`);
    if (!ok) return;
    try {
      await goalsApi.delete(id);
      toast('Meta excluída.', 'success');
      loadGoals();
    } catch {
      toast('Erro ao excluir.', 'error');
    }
  };

  // ── Save Goal ──────────────────────────────────────────────────────────────
  document.getElementById('btn-save-goal').onclick = async () => {
    const name = document.getElementById('goal-name').value.trim();
    const target = parseFloat(document.getElementById('goal-target').value);
    const curr = parseFloat(document.getElementById('goal-current').value) || 0;
    const account_id = document.getElementById('goal-account').value || null;
    const deadline = document.getElementById('goal-deadline').value || null;
    const icon = document.getElementById('goal-icon').value;
    const color = document.getElementById('goal-color').value;

    if (!name || !target || target <= 0) {
      toast('Preencha nome e valor alvo.', 'warning');
      return;
    }

    const payload = { name, target_amount: target, current_amount: curr, account_id, deadline, icon, color };
    try {
      if (editingGoalId) {
        await goalsApi.update(editingGoalId, payload);
        toast('Meta atualizada!', 'success');
      } else {
        await goalsApi.create(payload);
        toast('Meta criada! 🎯', 'success');
      }
      closeModal('goal-modal');
      loadGoals();
    } catch {
      toast('Erro ao salvar meta.', 'error');
    }
  };

  // ── Save Deposit ──────────────────────────────────────────────────────────
  document.getElementById('btn-save-deposit').onclick = async () => {
    const amount = parseFloat(document.getElementById('deposit-amount').value);
    if (isNaN(amount) || amount < 0) { toast('Valor inválido.', 'warning'); return; }
    try {
      await goalsApi.update(depositGoalId, { current_amount: amount });
      toast('Valor atualizado! 💰', 'success');
      closeModal('deposit-modal');
      loadGoals();
    } catch {
      toast('Erro ao atualizar.', 'error');
    }
  };

  // ── Modal Wiring ──────────────────────────────────────────────────────────
  setupModalClose('goal-modal');
  setupModalClose('deposit-modal');
  document.getElementById('btn-new-goal').onclick = openNewGoal;

  // ── Init ──────────────────────────────────────────────────────────────────
  await Promise.all([loadAccounts(), loadGoals()]);
</script>
</body>
</html>
