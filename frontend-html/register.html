<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta — SavePoint Finance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo__mark">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="1" x2="12" y2="23"/>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
      </div>
      <div class="auth-logo__title">SavePoint Finance</div>
      <div class="auth-logo__sub">Comece sua jornada financeira</div>
    </div>

    <div class="auth-form-card">
      <div class="tab-list" style="width:100%; margin-bottom: 24px;">
        <a href="/login"    class="tab-btn"        style="flex:1; text-align:center;">Entrar</a>
        <a href="/register" class="tab-btn active" style="flex:1; text-align:center;">Criar conta</a>
      </div>

      {% if error %}
      <div class="badge badge--expense" style="width:100%; margin-bottom:16px; padding: 10px 14px; border-radius: 8px; font-size:0.8125rem; text-transform:none; letter-spacing:0;">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/register" class="form-stack" onsubmit="return validatePasswords()">
        
        <!-- Trial Info Banner -->
        <div style="background: linear-gradient(135deg, rgba(0,229,122,0.1) 0%, rgba(0,229,122,0.05) 100%); border: 1px solid rgba(0,229,122,0.25); border-radius: 12px; padding: 16px; margin-bottom: 20px;">
          <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px; color:var(--accent);">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            <span style="font-weight:600; font-size:0.875rem; color:var(--accent);">Período de Teste Grátis</span>
          </div>
          <div style="font-size:0.8125rem; color:var(--text-dim); line-height:1.5;">
            Você terá acesso completo ao <strong>SavePoint Finance</strong> por <strong style="color:var(--text);">31 dias</strong>.<br>
            Após este período, o acesso será bloqueado até a assinatura do plano PRO.
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="workspace_name">Nome do Workspace</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <input type="text" id="workspace_name" name="workspace_name" class="form-input form-input--icon" placeholder="Minha Empresa" value="{{ workspace_name or '' }}" required autocomplete="organization">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="name">Nome completo</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/>
            </svg>
            <input type="text" id="name" name="name" class="form-input form-input--icon" placeholder="João Silva" value="{{ name or '' }}" required autocomplete="name">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="email" name="email" class="form-input form-input--icon" placeholder="seu@email.com" value="{{ email or '' }}" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" name="password" class="form-input form-input--icon" placeholder="Mínimo 6 caracteres" required autocomplete="new-password">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirmar senha</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="confirm_password" name="confirm_password" class="form-input form-input--icon" placeholder="Repita a senha" required autocomplete="new-password">
          </div>
        </div>

        <button type="submit" class="btn btn--primary btn--lg btn--w-full" style="margin-top:4px;">
          Criar conta
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

      <script>
      function validatePasswords() {
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm_password').value;
        
        if (password !== confirm) {
          alert('As senhas não conferem. Por favor, digite a mesma senha nos dois campos.');
          return false;
        }
        
        if (password.length < 6) {
          alert('A senha deve ter pelo menos 6 caracteres.');
          return false;
        }
        
        return true;
      }
      </script>
    </div>
  </div>
</body>
</html>
