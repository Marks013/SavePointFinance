<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Nova Senha — SavePoint Finance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    @media (max-width: 480px) {
      .auth-page { padding: 16px; }
      .auth-form-card { padding: 20px; }
      .auth-logo__mark { width: 44px; height: 44px; }
      .auth-logo__title { font-size: 1.25rem; }
    }
    
    .auth-card {
      animation: authCardEnter 0.6s var(--transition-bounce);
    }
    
    @keyframes authCardEnter {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    .auth-logo__mark {
      animation: logoFloat 4s ease-in-out infinite;
    }
    
    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    
    .form-input {
      transition: all 0.3s ease;
    }
    
    .form-input:focus {
      transform: translateY(-2px);
    }
    
    .btn--primary {
      position: relative;
      overflow: hidden;
    }
    
    .btn--primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .btn--primary:hover::before {
      opacity: 1;
    }

    .btn--primary:active {
      transform: scale(0.98);
    }

    .error-message {
      padding: 16px;
      background: rgba(255,77,106,0.1);
      border: 1px solid rgba(255,77,106,0.3);
      border-radius: 8px;
      color: var(--expense);
      font-size: 0.875rem;
      margin-bottom: 16px;
    }

    .success-message {
      padding: 16px;
      background: rgba(0,229,122,0.1);
      border: 1px solid rgba(0,229,122,0.3);
      border-radius: 8px;
      color: var(--income);
      font-size: 0.875rem;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo__mark pulse-glow">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="1" x2="12" y2="23"/>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
      </div>
      <div class="auth-logo__title">Nova Senha</div>
      <div class="auth-logo__sub">Crie uma nova senha para sua conta</div>
    </div>

    <!-- Card -->
    <div class="auth-form-card">
      {% if error %}
      <div class="error-message">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;flex-shrink:0;margin-right:8px;vertical-align:middle;">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      {% if success %}
      <div class="success-message">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;flex-shrink:0;margin-right:8px;vertical-align:middle;">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        {{ success }}
      </div>
      <p style="text-align:center; font-size:0.875rem; color:var(--text-dim); margin-bottom:20px;">
        Agora você pode fazer login com sua nova senha.
      </p>
      <a href="/login" class="btn btn--primary btn--lg btn--w-full" style="display:flex; align-items:center; justify-content:center; gap:8px;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Ir para Login
      </a>
      {% else %}
      <form method="POST" action="/reset-password" class="form-stack" id="resetForm">
        <input type="hidden" name="token" value="{{ token }}">
        
        <div class="form-group">
          <label class="form-label" for="new_password">Nova Senha</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              type="password"
              id="new_password"
              name="new_password"
              class="form-input form-input--icon"
              placeholder="Mínimo 6 caracteres"
              required
              autocomplete="new-password"
              minlength="6"
              data-validate="required"
              data-validate-min="6"
            >
            <button type="button" class="input-icon-right" onclick="togglePw('new_password')" title="Mostrar/ocultar senha">
              <svg id="eyeIcon1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="form-error" id="newPasswordError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirmar Nova Senha</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <input
              type="password"
              id="confirm_password"
              name="confirm_password"
              class="form-input form-input--icon"
              placeholder="Repita a nova senha"
              required
              autocomplete="new-password"
              minlength="6"
              data-validate="required"
            >
            <button type="button" class="input-icon-right" onclick="togglePw('confirm_password')" title="Mostrar/ocultar senha">
              <svg id="eyeIcon2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="form-error" id="confirmPasswordError"></span>
        </div>

        <button type="submit" class="btn btn--primary btn--lg btn--w-full" style="margin-top:4px;">
          <span class="btn-text">Alterar Senha</span>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </button>
      </form>

      <p style="text-align:center; font-size:0.8125rem; color:var(--text-dim); margin-top:18px;">
        <a href="/login" style="color:var(--text-dim); transition:color 0.15s;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-dim)'">
          Lembrou a senha? <strong>Entrar</strong>
        </a>
      </p>
      {% endif %}
    </div>
  </div>
</div>

<script>
function togglePw(fieldId) {
  const field = document.getElementById(fieldId);
  const iconId = fieldId === 'new_password' ? 'eyeIcon1' : 'eyeIcon2';
  const icon = document.getElementById(iconId);
  if (field.type === 'password') {
    field.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    icon.style.color = 'var(--accent)';
  } else {
    field.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    icon.style.color = '';
  }
}

// Form Validation
const resetForm = document.getElementById('resetForm');
if (resetForm) {
  const newPassword = document.getElementById('new_password');
  const confirmPassword = document.getElementById('confirm_password');
  const newPasswordError = document.getElementById('newPasswordError');
  const confirmPasswordError = document.getElementById('confirmPasswordError');

  function validatePassword(value) {
    if (!value) return 'Senha é obrigatória';
    if (value.length < 6) return 'Senha deve ter pelo menos 6 caracteres';
    return null;
  }

  function validateMatch() {
    if (newPassword.value && confirmPassword.value && newPassword.value !== confirmPassword.value) {
      return 'As senhas não conferem';
    }
    return null;
  }

  newPassword.addEventListener('blur', function() {
    const error = validatePassword(this.value);
    if (error) {
      this.classList.add('is-invalid');
      newPasswordError.textContent = error;
      newPasswordError.style.display = 'block';
    } else {
      this.classList.remove('is-invalid');
      this.classList.add('is-valid');
      newPasswordError.textContent = '';
      newPasswordError.style.display = 'none';
    }
  });

  confirmPassword.addEventListener('blur', function() {
    const error = validateMatch();
    if (error) {
      this.classList.add('is-invalid');
      confirmPasswordError.textContent = error;
      confirmPasswordError.style.display = 'block';
    } else {
      this.classList.remove('is-invalid');
      this.classList.add('is-valid');
      confirmPasswordError.textContent = '';
      confirmPasswordError.style.display = 'none';
    }
  });

  resetForm.addEventListener('submit', function(e) {
    let isValid = true;
    
    const pwdValidation = validatePassword(newPassword.value);
    if (pwdValidation) {
      e.preventDefault();
      newPassword.classList.add('is-invalid');
      newPasswordError.textContent = pwdValidation;
      newPasswordError.style.display = 'block';
      isValid = false;
    }
    
    const matchValidation = validateMatch();
    if (matchValidation) {
      e.preventDefault();
      confirmPassword.classList.add('is-invalid');
      confirmPasswordError.textContent = matchValidation;
      confirmPasswordError.style.display = 'block';
      isValid = false;
    }
  });
}
</script>
</body>
</html>
